<!DOCTYPE html>
<html lang="ko">
    <head>
        <script src="../js/head-common.js?ver=1"></script>
</head>

    <script>
        const id = params.get("id");
        const currentUrl = "repairState";
        const currentApi = "/repairState";

        $(function () {
            $("#year").val(id);
            getDetail();
        });

        async function getDetail() {
            const json = await Common.sendAxios(`${currentApi}?year=${id}`);

            if (json.code == 200) {
                const list = json.data;

                // 연도별 월별 데이터를 담을 맵 생성
                const yearMap = {};
                for (let i = 0; i < list.length; i++) {
                    const { year, month, repair_cnt } = list[i];
                    if (!yearMap[year]) yearMap[year] = {};
                    yearMap[year][month] = repair_cnt;
                }

                let html = "";

                // 연도별로 반복
                for (let m = 1; m <= 12; m++) {
                    const cnt = yearMap[id]?.[m] ?? 0;

                    html += `
                            <div class="info-in info-in-modify-info">
                                <p class="as-p">${m}월 기사 수</p>
                                <input
                                    type="text"
                                    class="number repair-cnt"
                                    data-month="${m}"
                                    placeholder="숫자만 입력해주세요."
                                    maxlength="11"
                                    value="${cnt}"
                                    readonly
                                />
                            </div>
                        `;
                }

                $("#repairCntWrap").html(html);
            }
        }

        function modify() {
            const queryString = window.location.search;
            location.href = `${currentUrl}_form.html${queryString}`;
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            params.delete("id");

            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_list.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_list.html`;
            }
        }
    </script>

    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div class="contents contents-add detail-view">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>A/S 기사 현황</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">
                            HOME > A/S 기사 관리 > A/S 기사 현황
                        </p>
                    </div>
                </div>
                <div class="contents-in scroll-custom" style="height: 531px">
                    <div class="info-in info-in-modify-info">
                        <p class="as-p">년도</p>

                        <input type="text" id="year" readonly />
                    </div>

                    <div id="repairCntWrap"></div>
                </div>

                <div class="btn-wrap" style="margin-top: 21px; right: 33px">
                    <div class="btn btn-del" onclick="backPage()">
                        <p>뒤로</p>
                    </div>
                    <div class="btn btn-add" onclick="modify()">
                        <p>수정</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
