<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>A/S 이력관리시스템</title>
        <link rel="shortcut icon" href="../img/ico_shortIcon.png" />
        <script
            src="https://code.jquery.com/jquery-3.6.1.min.js"
            integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ="
            crossorigin="anonymous"
        ></script>
        <script src="../js/axios.min.js"></script>
        <script src="../js/app-shell.js?ver=1"></script>
        <script type="text/javascript" src="../js/common.js?ver=1"></script>
        <link rel="stylesheet" href="../css/modern.css" />
        <link rel="stylesheet" href="../css/modern-dashboard.css" />
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
        <link rel="stylesheet" href="../css/common.css" />
        <link rel="stylesheet" href="../css/legacy-forms-lists.css" />
    </head>

    <script>
        const id = params.get("id");
        const currentUrl = "repairState";
        const currentApi = "/repairState";

        $(function () {
            const select = document.getElementById("year");
            const startYear = 2023;
            const currentYear = new Date().getFullYear();

            for (let year_ = currentYear; year_ >= startYear; year_--) {
                let option = document.createElement("option");
                option.value = year_;
                option.textContent = year_;
                select.appendChild(option);
            }

            if (id != null) {
                $("#saveBtn").html("수정");

                $("#year").val(id);
                getDetail();
            } else {
                makeMonthInputs();

                $(".btn-del").css("display", "none");
                $("#saveBtn").html("등록");
            }
        });

        function makeMonthInputs() {
            const $wrap = $("#repairCntWrap");
            $wrap.empty();

            for (let month = 1; month <= 12; month++) {
                const html = `
                    <div class="info-in">
                        <p class="as-p">${month}월 기사 수</p>
                        <input
                            type="text"
                            class="number repair-cnt"
                            data-month="${month}"
                            placeholder="숫자만 입력해주세요."
                            maxlength="11"
                            value="${month}"
                        />
                    </div>
                `;
                $wrap.append(html);
            }
        }

        async function getDetail() {
            const json = await Common.sendAxios(`${currentApi}?year=${id}`);

            if (json.code == 200) {
                const list = json.data;

                // 연도별 월별 데이터를 담을 맵 생성
                const yearMap = {};
                for (let i = 0; i < list.length; i++) {
                    const { year, month, repair_cnt } = list[i];
                    if (!yearMap[year]) yearMap[year] = {};
                    yearMap[year][month] = repair_cnt;
                }

                let html = "";

                // 연도별로 반복
                for (let m = 1; m <= 12; m++) {
                    const cnt = yearMap[id]?.[m] ?? 0;

                    html += `
                            <div class="info-in">
                                <p class="as-p">${m}월 기사 수</p>
                                <input
                                    type="text"
                                    class="number repair-cnt"
                                    data-month="${m}"
                                    placeholder="숫자만 입력해주세요."
                                    maxlength="11"
                                    value="${cnt}"
                                />
                            </div>
                        `;
                }

                $("#repairCntWrap").html(html);
            }
        }

        async function saveClick() {
            const formData = new FormData();

            formData.append(`year`, $("#year").val());

            $(".repair-cnt").each(function () {
                const month = $(this).data("month"); // 1~12
                const value = $(this).val() || 0; // 비어있으면 0

                // 예: repairCnt[1] = 3
                formData.append(`repair_cnt_list[${month}]`, value);
                formData.append(`repair_cnt_list[${month}]`, value);
            });

            const json = await Common.sendAxios(`${currentApi}/save`, formData);

            if (json.code == 200) {
                if (id == null) {
                    alert("등록되었습니다");

                    const params = new URLSearchParams(window.location.search);
                    params.delete("id");
                    const queryString = params.toString();
                    location.href = `${currentUrl}_list.html${queryString}`;
                } else {
                    alert("수정되었습니다");

                    const queryString = window.location.search;
                    location.href = `${currentUrl}_detail.html${queryString}`;
                }
            } else if (json.code == 202) {
                alert(json.msg);
                $(`#${json.data}`).focus();
            }
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_detail.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_detail.html`;
            }
        }
    </script>

    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div class="contents contents-add">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>A/S 기사 현황</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">
                            HOME > A/S 기사 관리 > A/S 기사 현황
                        </p>
                    </div>
                </div>
                <div class="contents-in scroll-custom" style="height: 531px">
                    <div class="info-in">
                        <p class="as-p">
                            <span class="r-value">*&nbsp;</span>
                            년도
                        </p>

                        <select
                            id="year"
                            class="input-select scroll-custom"
                        ></select>
                    </div>

                    <div id="repairCntWrap"></div>
                </div>

                <div class="btn-wrap" style="margin-top: 21px; right: 33px">
                    <div class="btn btn-del" onclick="deletion()">
                        <p>삭제</p>
                    </div>
                    <div class="btn btn-del" onclick="backPage()">
                        <p>뒤로</p>
                    </div>
                    <div class="btn btn-add" onclick="saveClick()">
                        <p id="saveBtn"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
