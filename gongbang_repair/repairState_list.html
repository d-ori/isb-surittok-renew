<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>A/S 이력관리시스템</title>
        <link rel="shortcut icon" href="../img/ico_shortIcon.png" />
        <script
            src="https://code.jquery.com/jquery-3.6.1.min.js"
            integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ="
            crossorigin="anonymous"
        ></script>
        <script src="../js/axios.min.js"></script>
        <script src="../js/app-shell.js?ver=1"></script>
        <script type="text/javascript" src="../js/common.js?ver=1"></script>
        <link rel="stylesheet" href="../css/modern.css" />
        <link rel="stylesheet" href="../css/modern-dashboard.css" />
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
        <link rel="stylesheet" href="../css/common.css" />
        <link rel="stylesheet" href="../css/legacy-forms-lists.css" />

        <!-- Sheet JS -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.14.3/xlsx.full.min.js"></script>
        <!--FileSaver savaAs 이용 -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.min.js"></script>
    </head>

    <script>
        let arr = [];
        const currentUrl = "repairState";
        const currentApi = "/repairState";
        const cate = decodeURI(params.get("cate")) || "";

        $(async function () {
            await getYearList();

            await getList();
        });

        async function getYearList() {
            const json = await Common.sendAxios(`${currentApi}/year`);

            if (json.code == 200) {
                const list = json.data;

                if (list.length == 0) {
                    alert(
                        "등록된 데이터가 없습니다.\n기사 현황을 등록해주세요."
                    );

                    add();
                }

                $("#cate").empty();

                $("#cate").append(`<option value="0">전체</option>`);

                list.forEach((y) => {
                    $("#cate").append(
                        `<option value="${y.year}">${y.year}년</option>`
                    );
                });
            }
        }

        // 리스트
        async function getList() {
            const year_ = Number($("#cate").val());

            const json = await Common.sendAxios(`${currentApi}?year=${year_}`);

            if (json.code == 200) {
                const list = json.data;

                // 연도별 월별 데이터를 담을 맵 생성
                const yearMap = {};
                for (let i = 0; i < list.length; i++) {
                    const { year, month, repair_cnt } = list[i];
                    if (!yearMap[year]) yearMap[year] = {};
                    yearMap[year][month] = repair_cnt;
                }

                // 선택한 연도가 0이면 list 안에서 첫 연도를 시작 연도로 지정
                let displayYears = [];
                if (year_ === 0) {
                    displayYears = Object.keys(yearMap)
                        .map(Number)
                        .sort((a, b) => a - b);
                } else {
                    displayYears = [year_];
                }

                let html = "";

                // 연도별로 반복
                displayYears
                    .sort((a, b) => b - a)
                    .forEach((year) => {
                        html += `<tr onclick="detail(event, ${year})"><td colspan="3" class="t-title">${year}년</td>`;

                        for (let m = 1; m <= 12; m++) {
                            const cnt = yearMap[year]?.[m] ?? 0; // 데이터 없으면 0
                            html += `<td>${cnt}</td>`;
                        }

                        html += `</tr>`;
                    });

                $("#list").html(html);
            }
        }

        // 등록
        function add() {
            location.href = `${currentUrl}_form.html`;
        }

        // 상세
        function detail(e, id) {
            var targetId = $(e.target).attr("id") || "";

            if (targetId.includes("row")) {
                return;
            }

            const queryString = window.location.search;
            location.href = `${currentUrl}_detail.html?id=${id}${queryString.replace(
                "?",
                "&"
            )}`;
        }

        // 엑셀 다운로드
        function excel_download() {
            Common.sendAxios(
                `${currentApi}?keyword=${keyword}&page=${page}&sort=${sort}&cate=${cate}&usePageNavy=false`
            )
                .then(async (json) => {
                    const list = json.data;

                    if (list.length == 0) {
                        alert("조회된 결과가 없습니다.");
                        return;
                    }

                    const excelData = list.map((data) => ({
                        기사명: data.name,
                        연락처: Common.formatPhoneNumber(data.phone),
                        비고: data.note.split("<br>").join(" "),
                        생성일: data.created_at,
                    }));

                    const sheet = XLSX.utils.json_to_sheet(excelData);
                    const wb = XLSX.utils.book_new();
                    const str = "AS기사관리";
                    XLSX.utils.book_append_sheet(wb, sheet, str);

                    const wbout = XLSX.write(wb, {
                        bookType: "xlsx",
                        type: "binary",
                    });
                    const fileName = `${str}_${Common.getCurrentFormattedTime()}.xlsx`;

                    saveAs(
                        new Blob([s2ab(wbout)], {
                            type: "application/octet-stream",
                        }),
                        fileName
                    );
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function s2ab(s) {
            var buf = new ArrayBuffer(s.length); //convert s to arrayBuffer
            var view = new Uint8Array(buf); //create uint8array as viewer
            for (var i = 0; i < s.length; i++) view[i] = s.charCodeAt(i) & 0xff; //convert to octet
            return buf;
        }
    </script>

    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div class="contents">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>A/S 기사 현황</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">
                            HOME > A/S 기사 관리 > A/S 기사 현황
                        </p>
                    </div>
                </div>
                <div class="search">
                    <img src="../img/ico_search.png" class="ico-search" />

                    <select
                        id="cate"
                        onchange="getList()"
                        style="width: 100px; padding-left: 10px"
                        class="search-select"
                    ></select>

                    <div class="btn-wrap">
                        <div
                            class="btn btn-excel btn-excel-down"
                            onclick="excel_download()"
                        >
                            <p>엑셀 다운로드</p>
                        </div>
                        <div class="btn btn-add" onclick="add()">
                            <p>등록</p>
                        </div>
                    </div>
                </div>

                <div class="contents-in scroll-custom">
                    <div
                        class="list kpi-as-list scroll-custom"
                        style="height: 95%; margin-top: 5px"
                    >
                        <table>
                            <tbody>
                                <tr class="t-header">
                                    <th
                                        colspan="3"
                                        style="border-right: 1px solid #e4e8ea"
                                    >
                                        항목/월(Month)
                                    </th>
                                    <th>1월</th>
                                    <th>2월</th>
                                    <th>3월</th>
                                    <th>4월</th>
                                    <th>5월</th>
                                    <th>6월</th>
                                    <th>7월</th>
                                    <th>8월</th>
                                    <th>9월</th>
                                    <th>10월</th>
                                    <th>11월</th>
                                    <th>12월</th>
                                </tr>
                            </tbody>

                            <tbody id="list"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
