<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>A/S 이력관리시스템</title>
        <link rel="shortcut icon" href="../img/ico_shortIcon.png" />
        <script
            src="https://code.jquery.com/jquery-3.6.1.min.js"
            integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ="
            crossorigin="anonymous"
        ></script>
        <script src="../js/axios.min.js"></script>
        <script src="../js/app-shell.js?ver=1"></script>
        <script type="text/javascript" src="../js/common.js?ver=1"></script>
        <link rel="stylesheet" href="../css/modern.css" />
        <link rel="stylesheet" href="../css/modern-dashboard.css" />
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
        <link rel="stylesheet" href="../css/common.css" />
        <link rel="stylesheet" href="../css/legacy-forms-lists.css" />

        <!-- Sheet JS -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.14.3/xlsx.full.min.js"></script>
        <!-- FileSaver savaAs 이용 -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.min.js"></script>
    </head>

    <script>
        let arr = [];
        const currentUrl = "user";
        const currentApi = "/partner";
        const sort =
            params.get("sort") == undefined
                ? decodeURI("a.created_at DESC")
                : decodeURI(params.get("sort"));
        const page = params.get("page") || "1";
        const keyword = decodeURI(params.get("keyword")) || "";

        $(function () {
            if (params.get("page") == null) {
                location.href = `${currentUrl}_list.html?page=1&keyword=&sort=${sort}`;
            } else {
                let [sortColumn, sortDir] = sort.split(" ");
                sortColumn = sortColumn.replace(".", "_");

                const arrowIcon =
                    sortDir === "DESC"
                        ? "ico_arrow_down.png"
                        : "ico_arrow_up.png";

                $(`#sort_${sortColumn}`).attr("src", `../img/${arrowIcon}`);

                getList();
            }
        });

        // sort
        function sortClick(select) {
            // 현재 sort 상태가 예: "name DESC" 또는 "name"
            const [currentColumn, currentDirection] = sort.split(" ");

            // 같은 컬럼 클릭 시 정렬 방향 토글, 다른 컬럼 클릭 시 DESC로 시작
            const newDirection =
                currentColumn === select
                    ? currentDirection === "DESC"
                        ? ""
                        : "DESC"
                    : "DESC";

            // 정렬 문자열 구성 (기본 오름차순이면 컬럼명만 넘김)
            const newSort = newDirection ? `${select} ${newDirection}` : select;

            location.href = `${currentUrl}_list.html?page=${page}&keyword=${keyword}&sort=${newSort}`;
        }

        // 리스트
        function getList() {
            $("#search").val(keyword);

            Common.sendAjax(
                `${currentApi}?keyword=${keyword}&page=${page}&sort=${sort}`,
                "",
                "GET",
                function (json) {
                    try {
                        if (json.code == 200) {
                            const list = json.data;
                            const searchVO = json.searchVO;

                            if (list.length == 0) {
                                $("#list").append(
                                    $(
                                        `<tr><td colspan='${$("#list").closest("table").find("colgroup col").length}'>검색 결과가 없습니다.</td></tr>`,
                                    ),
                                );
                                return false;
                            }

                            $("#list").empty();

                            Common.renderPaging(searchVO);

                            for (let i = 0; i < list.length; i++) {
                                const data = list[i];
                                const id = data.cmpn_id;
                                let tr = $(
                                    `<tr id="tr${id}" class="list_check" val="${id}" onclick="detail(event, ${id})">`,
                                );

                                const listno =
                                    searchVO.totalCnt -
                                    ((searchVO.page - 1) * searchVO.recordSize +
                                        i);
                                const created_at = data.created_at;
                                const name = data.name;
                                const owner = data.owner?.trim() || "-";
                                const addr1 = data.addr1 || "";
                                const addr2 = data.addr2 || "";
                                const addr =
                                    (addr1 + " " + addr2).trim() || "-";
                                const bizno = Common.formatBusinessNumber(
                                    data.bizno,
                                );
                                const tel = Common.formatPhoneNumber(data.tel);
                                const user_name = data.user_name;

                                tr.append($($(`<td>${listno}</td>`)));
                                tr.append($(`<td>${name}</td>`));
                                tr.append($(`<td>${user_name}</td>`));
                                tr.append($(`<td>${owner}</td>`));
                                tr.append($(`<td>${tel}</td>`));
                                tr.append($(`<td>${addr}</td>`));
                                tr.append($(`<td>${bizno}</td>`));
                                tr.append($(`<td>${created_at}</td>`));

                                $("#list").append(tr);
                            }

                            check();
                        } else if (json.code == 202) {
                            alert(json.msg);
                        }
                    } catch (Excpetion) {
                        console.log("스크립트 에러 " + Excpetion);
                    }
                },
            );
        }

        // paging 이동
        function pageMove(pageIndex) {
            location.href = `${currentUrl}_list.html?page=${pageIndex}&keyword=${keyword}&sort=${sort}`;
        }

        // 체크박스
        function check() {
            $("input[name=_selected_all_]").on("change", function () {
                $("input[name=_selected_]").prop("checked", this.checked);
                if (this.checked) {
                    $("tr").addClass("selected-row");
                } else {
                    $("tr").removeClass("selected-row");
                }
            });

            $("input[name=_selected_]").on("change", function () {
                $(this).closest("tr").toggleClass("selected-row", this.checked);

                const allChecked =
                    $("input[name=_selected_]").length ===
                    $("input[name=_selected_]:checked").length;
                $("input[name=_selected_all_]").prop("checked", allChecked);
            });
        }

        // search - Enter
        function enterkey() {
            if (window.event.keyCode == 13) {
                search();
            }
        }

        // 검색
        function search() {
            location.href = `${currentUrl}_list.html?page=1&keyword=${decodeURI(
                $("#search").val(),
            )}&sort=${sort}`;
        }

        // 등록
        function add() {
            location.href = `${currentUrl}_form.html`;
        }

        // 상세
        function detail(e, id) {
            var targetId = $(e.target).attr("id") || "";

            if (targetId.includes("row")) {
                return;
            }

            const queryString = window.location.search;
            location.href = `${currentUrl}_detail.html?id=${id}${queryString.replace(
                "?",
                "&",
            )}`;
        }

        // 엑셀 다운로드
        function excel_download() {
            Common.sendAjax(
                `${currentApi}?keyword=${keyword}&page=${page}&sort=${sort}&usePageNavy=false`,
                "",
                "GET",
                function (json) {
                    try {
                        const list = json.data;

                        if (list.length == 0) {
                            alert("조회된 결과가 없습니다.");
                            return;
                        }

                        const excelData = list.map((data) => ({
                            업체명: data.name,
                            관리자명: data.user_name,
                            대표자명: data.owner?.trim() || "-",
                            대표번호: Common.formatPhoneNumber(data.tel),
                            주소:
                                (
                                    data.addr1 ||
                                    "" + " " + data.addr2 ||
                                    ""
                                ).trim() || "-",
                            사업자번호: Common.formatBusinessNumber(data.bizno),
                            비고:
                                data.note.split("<br>").join(" ")?.trim() ||
                                "-",
                            생성일: data.created_at,
                        }));

                        const sheet = XLSX.utils.json_to_sheet(excelData);
                        const wb = XLSX.utils.book_new();
                        const str = "사용자 관리";
                        XLSX.utils.book_append_sheet(wb, sheet, str);

                        const wbout = XLSX.write(wb, {
                            bookType: "xlsx",
                            type: "binary",
                        });
                        const fileName = `${str}_${Common.getCurrentFormattedTime()}.xlsx`;

                        saveAs(
                            new Blob([s2ab(wbout)], {
                                type: "application/octet-stream",
                            }),
                            fileName,
                        );
                    } catch (e) {
                        console.error("엑셀 다운로드 중 오류 발생", e);
                    }
                },
            );
        }

        function s2ab(s) {
            var buf = new ArrayBuffer(s.length); //convert s to arrayBuffer
            var view = new Uint8Array(buf); //create uint8array as viewer
            for (var i = 0; i < s.length; i++) view[i] = s.charCodeAt(i) & 0xff; //convert to octet
            return buf;
        }
    </script>

    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div class="contents">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>사용자 등록</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">HOME > 사용자 관리 > 사용자 등록</p>
                    </div>
                </div>
                <div class="search">
                    <img src="../img/ico_search.png" class="ico-search" />

                    <div class="search-in">
                        <input
                            type="text"
                            placeholder="검색어를 입력해주세요."
                            class="search-input"
                            id="search"
                            onkeypress="enterkey()"
                        />
                        <p class="btn btn-search" onclick="search()">검색</p>
                    </div>

                    <div class="btn-wrap">
                        <div
                            class="btn btn-excel btn-excel-down"
                            onclick="excel_download()"
                        >
                            <p>엑셀 다운로드</p>
                        </div>

                        <div class="btn btn-add" onclick="add()">
                            <p>등록</p>
                        </div>
                    </div>
                </div>
                <div class="contents-in">
                    <div class="list">
                        <table>
                            <colgroup>
                                <col style="width: 100px" />
                                <col style="width: 20%" />
                                <col style="width: 15%" />
                                <col style="width: 15%" />
                                <col style="width: 10%" />
                                <col style="width: 30%" />
                                <col style="width: 10%" />
                                <col style="width: 200px" />
                            </colgroup>
                            <tbody>
                                <tr class="t-header">
                                    <th>No.</th>
                                    <th>
                                        업체명
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_name"
                                            onclick="sortClick('a.name')"
                                        />
                                    </th>
                                    <th>관리자명</th>
                                    <th>
                                        대표자명
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_owner"
                                            onclick="sortClick('a.owner')"
                                        />
                                    </th>
                                    <th>대표번호</th>
                                    <th>주소</th>
                                    <th>사업자등록번호</th>
                                    <th>
                                        생성일
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_created_at"
                                            onclick="sortClick('a.created_at')"
                                        />
                                    </th>
                                </tr>
                            </tbody>

                            <tbody id="list"></tbody>
                        </table>
                    </div>
                    <div class="paging">
                        <div class="paging-inner" id="pagingArea"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
