<!DOCTYPE html>
<html lang="ko">
    <head>
        <script src="../js/head-common.js?ver=1"></script>
</head>

    <script>
        const id = params.get("id");
        const currentUrl = "user";
        const currentApi = "/partner";

        $(function () {
            if (id != null) {
                $("#saveBtn").html("수정");
                $("#pw").attr("placeholder", "비밀번호 변경 시 입력해주세요.");
                $("#pw-span").css("display", "none");

                getDetail();
            } else {
                $(".btn-del").css("display", "none");
                $("#saveBtn").html("등록");
            }
        });

        function getDetail() {
            Common.sendAjax(`${currentApi}/${id}`, "", "GET", function (json) {
                try {
                    const data = json.data;

                    const name = data.name;
                    const owner = data.owner;
                    const tel = Common.formatPhoneNumber(data.tel);
                    const addr1 = data.addr1;
                    const addr2 = data.addr2;
                    const addr3 = data.addr3;
                    const bizno = Common.formatBusinessNumber(data.bizno);
                    const note = data.note.replaceAll("<br>", "\r\n");

                    $("#name").val(name);
                    $("#owner").val(owner);
                    $("#tel").val(tel);
                    $("#addr1").val(addr1);
                    $("#addr2").val(addr2);
                    $("#zipcode").val(addr3);
                    $("#bizno").val(bizno);
                    $("#note").val(note);
                } catch (Excpetion) {
                    console.log("스크립트 에러 " + Excpetion);
                }
            });
        }

        function modify() {
            const queryString = window.location.search;
            location.href = `${currentUrl}_form.html${queryString}`;
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            params.delete("id");

            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_list.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_list.html`;
            }
        }
    </script>

    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div class="contents contents-add">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>사용자 등록</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">HOME > 사용자 관리 > 사용자 등록</p>
                    </div>
                </div>
                <div
                    class="contents-in scroll-custom"
                    style="height: calc(100vh - 350px)"
                >
                    <div class="info-in">
                        <p>업체명</p>
                        <input type="text" id="name" />
                    </div>
                    <div class="info-in">
                        <p>대표자명</p>
                        <input type="text" id="owner" />
                    </div>
                    <div class="info-in">
                        <p>대표번호</p>
                        <input type="text" id="tel" />
                    </div>
                    <div class="info-in info-addr">
                        <p>주소</p>
                        <div class="addr-wrap">
                            <div class="addr-zipcode-wrap">
                                <input type="text" id="zipcode" />
                            </div>
                            <input
                                type="text"
                                id="addr1"
                                class="addr-dtl"
                                style="cursor: text"
                            />
                            <input type="text" id="addr2" class="addr-dtl" />
                        </div>
                    </div>
                    <div class="info-in">
                        <p>사업자등록번호</p>
                        <input type="text" id="bizno" />
                    </div>
                    <div class="info-in info-in-rm">
                        <p>비고</p>
                        <textarea class="scroll-custom" id="note"></textarea>
                    </div>
                </div>

                <div class="btn-wrap" style="margin-top: 21px; right: 33px">
                    <div class="btn btn-del" onclick="backPage()">
                        <p>뒤로</p>
                    </div>
                    <div class="btn btn-add" onclick="saveClick()">
                        <p id="saveBtn"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
