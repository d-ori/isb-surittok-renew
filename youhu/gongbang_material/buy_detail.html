<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>мң нңҙмһҗмһ¬кҙҖлҰ¬</title>
        <link rel="shortcut icon" href="../img/ico_shortIcon.png" />
        <script
            src="https://code.jquery.com/jquery-3.6.1.min.js"
            integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ="
            crossorigin="anonymous"
        ></script>
        <script src="../js/axios.min.js"></script>
        <script src="../js/common.js"></script>
        <link rel="stylesheet" href="../css/common.css" />
        <link rel="stylesheet" href="../css/style.css" />

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
    </head>

    <script>
        const id = params.get("id");
        const currentUrl = "buy";
        const currentApi = "/youhu";
        let info = JSON.parse(localStorage.getItem("info_youhu"));

        let fileList_youhu = [];

        $(function () {
            getDetail();
        });

        async function getDetail() {
            Common.sendAxios(`${currentApi}/${id}`)
                .then(async (json) => {
                    const data = json.data;

                    const cmpn_name = data.cmpn_name;
                    const name = data.name;
                    const price = data.price;
                    const qntty = data.qntty;
                    const standard = data.standard;
                    const phone = data.phone;
                    const note = data.note.replaceAll("<br>", "\r\n");
                    const type = data.type;

                    if (info.cmpn_id == data.cmpn_id) {
                        $(".btn-qna").css("display", "none");
                    } else {
                        $(".btn-add").css("display", "none");
                    }

                    if (type == "N") {
                        $("#type").val("к°ҖкІ© нҳ‘мқҳ");
                        $("#price").val("к°ҖкІ© нҳ‘мқҳ");
                    } else {
                        $("#type").val("нқ¬л§қ к°ҖкІ©");
                        $("#price").val(Common.numberWithCommas(price));
                    }

                    $("#cmpn_name").val(cmpn_name);
                    $("#name").val(name);
                    $("#qntty").val(Common.numberWithCommas(qntty));
                    $("#standard").val(standard);
                    $("#phone").val(Common.formatPhoneNumber(phone));
                    $("#note").val(note);

                    const fileDto = json.searchVO;

                    for (let i = 0; i < fileDto.length; i++) {
                        const file = fileDto[i];

                        if (file.upload_column == "youhu") {
                            $("#preview_youhu").append(
                                `<li><img src="${file.upload_url}"></li>`,
                            );
                        }
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function modify() {
            const queryString = window.location.search;
            location.href = `${currentUrl}_form.html${queryString}`;
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            params.delete("id");

            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_list.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_list.html`;
            }
        }
    </script>

    <body>
        <div class="top"></div>
        <div class="main">
            <div class="menu"></div>
            <div class="contents contents-add">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>мң нңҙмһҗмһ¬ кө¬л§Ө</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">мң нңҙмһҗмһ¬кҙҖлҰ¬ > мң нңҙмһҗмһ¬ кө¬л§Ө</p>
                    </div>
                </div>

                <div class="contents-in scroll-custom contents-in-dtl">
                    <div class="info-in info-in-modify-info">
                        <p class="info-title">м—…мІҙлӘ…</p>
                        <input type="text" id="cmpn_name" readonly />
                    </div>
                    <div class="info-in info-in-modify-info">
                        <p class="info-title">кө¬л§Ө м—°лқҪмІҳ</p>
                        <input type="text" id="phone" readonly />
                    </div>
                    <div class="info-in info-in-modify-info">
                        <p class="info-title">м ңн’ҲлӘ…</p>
                        <input type="text" id="name" readonly />
                    </div>
                    <div class="info-in info-in-modify-info">
                        <p class="info-title">мҲҳлҹү</p>
                        <input type="text" id="qntty" readonly />
                    </div>
                    <div class="info-in info-in-modify-info">
                        <p class="info-title">к·ңкІ©</p>
                        <input type="text" id="standard" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p class="info-title">кұ°лһҳ нғҖмһ…</p>
                        <input type="text" id="type" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p class="info-title">нқ¬л§қ к°ҖкІ©</p>
                        <input type="text" id="price" readonly />
                    </div>

                    <div
                        class="info-in info-in- info-in-modify-info"
                        style="height: 112px"
                    >
                        <p class="info-title info-title-t">м„ёл¶Җм„ӨлӘ…</p>
                        <textarea
                            class="scroll-custom"
                            style="height: 100px"
                            id="note"
                            readonly
                        ></textarea>
                    </div>

                    <div class="info-in info-file">
                        <div class="info-file-in">
                            <p>мқҙлҜём§Җ мІЁл¶Җ</p>

                            <div>
                                <div
                                    class="info-file-inner"
                                    style="height: 122px"
                                >
                                    <div class="img-list scroll-custom">
                                        <ul
                                            class="image-preview"
                                            id="preview_youhu"
                                        ></ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="btn-wrap" style="margin-top: 21px; right: 33px">
                    <div class="btn btn-del" onclick="backPage()">
                        <p>лӘ©лЎқ</p>
                    </div>
                    <div class="btn btn-add" onclick="modify()">
                        <p>мҲҳм •</p>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function readURL_youhu(input) {
                const files = Array.from(input.files);

                // мғҲлЎңмҡҙ нҢҢмқјл“Өмқ„ fileListм—җ м¶”к°Җ
                files.forEach((file) => {
                    if (fileList_youhu.length < 10) {
                        fileList_youhu.push(file);
                    }
                });

                // лҜёлҰ¬ліҙкё° UIлҘј fileList мҲңм„ңлҢҖлЎң л ҢлҚ”л§Ғ
                renderPreview_youhu();
            }

            async function renderPreview_youhu() {
                const previewContainer =
                    document.getElementById("preview_youhu");
                previewContainer.innerHTML = ""; // кё°мЎҙ UI мҙҲкё°нҷ”

                // fileListмқҳ мҲңм„ңлҢҖлЎң лҜёлҰ¬ліҙкё° UIлҘј к·ёлҰ°лӢӨ
                for (let i = 0; i < fileList_youhu.length; i++) {
                    const file = fileList_youhu[i];

                    // FileReaderлҘј мӮ¬мҡ©н•ҙ мқҙлҜём§ҖлҘј мқҪкі  лҜёлҰ¬ліҙкё° UIм—җ м¶”к°Җ
                    const reader = new FileReader();
                    await new Promise((resolve) => {
                        reader.onload = function (e) {
                            const li = document.createElement("li");
                            li.setAttribute("draggable", "true");
                            li.classList.add("image-item");

                            // к°Ғ divм—җ кі мң н•ң index л¶Җм—¬ (data-index мҶҚм„ұ нҷңмҡ©)
                            li.setAttribute("data-index", i);

                            const img = document.createElement("img");
                            img.src = e.target.result;

                            const btn = document.createElement("button");
                            btn.innerText = "X";
                            btn.classList.add("delete-btn");
                            btn.onclick = function () {
                                fileList_youhu.splice(i, 1); // fileListм—җм„ң н•ҙлӢ№ нҢҢмқј мӮӯм ң
                                renderPreview_youhu(); // лҜёлҰ¬ліҙкё° UI лӢӨмӢң л ҢлҚ”л§Ғ
                            };

                            li.appendChild(img);
                            li.appendChild(btn);
                            previewContainer.appendChild(li);

                            resolve(); // нҢҢмқј мқҪкё° мҷ„лЈҢ нӣ„ resolve нҳём¶ң
                        };

                        reader.readAsDataURL(file); // нҢҢмқјмқ„ мқҪм–ҙм„ң л№„лҸҷкё°м ҒмңјлЎң мІҳлҰ¬
                    });
                }

                // мқҙм ң updateSortable нҳём¶ң
                updateSortable_youhu();
            }

            function imgClear_youhu() {
                fileList_youhu = [];
                renderPreview_youhu();
            }

            function updateSortable_youhu() {
                $("#preview_youhu")
                    .sortable({
                        update: function () {
                            let newOrder = [];

                            // мғҲлЎңмҡҙ мҲңм„ңлҢҖлЎң fileList м—…лҚ°мқҙнҠё
                            $("#preview_youhu .image-item").each(function () {
                                let index = $(this).attr("data-index");
                                // мғҲлЎңмҡҙ мҲңм„ңлҢҖлЎң fileListлҘј м—…лҚ°мқҙнҠё
                                newOrder.push(fileList_youhu[index]);
                            });

                            // мғҲлЎңмҡҙ мҲңм„ңлҢҖлЎң fileListлҘј к°ұмӢ 
                            fileList_youhu = [...newOrder];

                            // мҲңм„ңк°Җ ліҖкІҪлҗң нӣ„ лҜёлҰ¬ліҙкё° UI м—…лҚ°мқҙнҠё
                            setTimeout(function () {
                                renderPreview_youhu(); // л”ңл Ҳмқҙ нӣ„ мҲңм„ңк°Җ м ңлҢҖлЎң л°ҳмҳҒлҗҳлҸ„лЎқ лҜёлҰ¬ліҙкё° UI лӢӨмӢң л ҢлҚ”л§Ғ
                            }, 200); // 200ms м •лҸ„ кё°лӢӨлҰ° нӣ„ м—…лҚ°мқҙнҠё
                        },
                    })
                    .disableSelection();
            }
        </script>

        <div
            id="imgModal"
            style="
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                justify-content: center;
                align-items: center;
            "
        >
            <img id="modalImg" src="" style="max-width: 90%; max-height: 90%" />
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const lists = document.querySelectorAll(".img-list"); // лӘЁл“  img-list м„ нғқ
                if (!lists.length) return;

                const modal = document.getElementById("imgModal");
                const modalImg = document.getElementById("modalImg");

                lists.forEach((list) => {
                    list.addEventListener("click", (e) => {
                        if (e.target.tagName === "IMG") {
                            modalImg.src = e.target.src;
                            modal.style.display = "flex";
                        }
                    });
                });

                modal.addEventListener("click", () => {
                    modal.style.display = "none";
                    modalImg.src = "";
                });
            });
        </script>
    </body>
</html>
