            Common.sendAxios(`/account/logout`)

                    localStorage.clear();
                    location.href = "/youhu/login.html";

                    $(this).find(".ico-hover").show();
                }

            var isCurrentlyOn = $(this).hasClass("menu-on");

                $(this).addClass("menu-on");
                $(this).find(".ico-menu").hide();
                $(this).find(".ico-hover").show();
