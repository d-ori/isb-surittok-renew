<!DOCTYPE html>

    <script>
        function unregister() {
            var unregister = confirm(
                "모든 회원 정보가 삭제됩니다.\n탈퇴하시겠습니까?"
            );

            if (unregister) {
                let formData = new FormData();

                Common.sendAxios(`/account/delete`, formData)
                    .then(async (json) => {
                        if (json.code == 200) {
                            Common.sendAxios(`/account/logout`)
                                .then(async (json) => {
                                    localStorage.clear();
                                    location.href = "/login.html";
                                })
                                .catch((err) => {
                                    console.error("ERROR : ", err);
                                });
                        }
                    })
                    .catch((err) => {
                        console.error("ERROR : ", err);
                    });
            }
        }
    </script>
