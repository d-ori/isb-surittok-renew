<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>A/S 이력관리시스템</title>
        <link rel="shortcut icon" href="../img/ico_shortIcon.png" />
        <script

            crossorigin="anonymous"
        ></script>
        <script src="../js/axios.min.js"></script>
        <script src="../js/app-shell.js?ver=1"></script>
        <script src="../js/common.js"></script>
        <link rel="stylesheet" href="../css/modern.css" />
        <link rel="stylesheet" href="../css/modern-dashboard.css" />
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
        <link rel="stylesheet" href="../css/common.css" />
        <link rel="stylesheet" href="../css/legacy-forms-lists.css" />
    </head>
    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div class="contents scroll-custom">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>회원정보</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">HOME > 마이페이지 > 정보관리</p>
                    </div>
                </div>
                <div class="contents-in contents-mypage">
                    <div class="menu-mypage">
                        <div class="menu-mypage-top">
                            <img src="../img/ico_mypage.png" />
                            <p>마이페이지</p>
                        </div>
                        <ul>
                            <li class="on">
                                <p onclick="location.href='user_info.html'">

                            </li>
                            <li>

                        <div class="mypage-in">

                                        <img
                                            src="../img/ico_unregister_complete.png"
                                        />
                                        <p>탈퇴가 완료 되었습니다.</p>
                                    </div>
                                    <div
                                        class="btn-mypage"
                                        style="position: relative; bottom: auto"
                                    >
                                        <p
                                            class="btn-mypage-b"
                                            style="margin-right: 10px"

                                            확인
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
