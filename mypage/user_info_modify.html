<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>A/S 이력관리시스템</title>
        <link rel="shortcut icon" href="../img/ico_shortIcon.png" />
        <script
            src="https://code.jquery.com/jquery-3.6.1.min.js"
            integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ="
            crossorigin="anonymous"
        ></script>
        <script src="../js/axios.min.js"></script>
        <script type="text/javascript" src="../js/common.js?ver=1"></script>
        <link rel="stylesheet" href="../css/common.css" />
        <link rel="stylesheet" href="../css/style.css" />
        <!-- 카카오맵 연동 -->
        <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    </head>

    <script>
        function kakaopost() {
            new daum.Postcode({
                oncomplete: function (data) {
                    document.querySelector("#zipcode").value = data.zonecode;
                    document.querySelector("#addr1").value = data.address + " ";
                    document.querySelector("#addr2").value = "";
                },
            }).open();
        }

        $(function () {
            getUserInfo();
        });

        function getUserInfo() {
            Common.sendAxios(`/account/cmpn`)
                .then(async (json) => {
                    const data = json.data;

                    $("#name").html(data.name);
                    $("#user_name").val(data.user_name);
                    $("#phone").val(data.phone);
                    $("#addr1").html(data.addr1);
                    $("#addr2").html(data.addr2);
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function modify() {
            if (
                Common.nullCheck($("#user_name").val(), "user_name", "담당자명")
            )
                return;
            if (Common.nullCheck($("#phone").val(), "phone", "휴대폰 번호"))
                return;

            let formData = new FormData();
            formData.append("name", $("#user_name").val());
            formData.append("phone", $("#phone").val());
            formData.append("pw", $("#pw").val());

            Common.sendAxios(`/account/cmpn`, formData)
                .then(async (json) => {
                    if (json.code == 200) {
                        alert(
                            "회원정보가 수정 되었습니다.\n재로그인 해주세요."
                        );

                        Common.sendAxios(`/account/logout`)
                            .then(async (json) => {
                                localStorage.clear();
                                location.href = "/login.html";
                            })
                            .catch((err) => {
                                console.error("ERROR : ", err);
                            });
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }
    </script>

    <body>
        <div class="top"></div>
        <div class="main">
            <div class="menu"></div>
            <div class="contents scroll-custom">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>회원정보</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">HOME > 마이페이지 > 정보관리</p>
                    </div>
                </div>
                <div class="contents-in contents-mypage">
                    <div class="menu-mypage">
                        <div class="menu-mypage-top">
                            <img src="../img/ico_mypage.png" />
                            <p>마이페이지</p>
                        </div>
                        <ul>
                            <li class="on">
                                <p onclick="location.href='user_info.html'">
                                    정보관리
                                </p>
                            </li>
                            <li>
                                <p onclick="location.href='order_list.html'">
                                    주문정보
                                </p>
                            </li>
                            <li>
                                <p onclick="location.href='inquiry_list.html'">
                                    문의내역
                                </p>
                            </li>
                        </ul>
                    </div>
                    <div class="mypage-wrap">
                        <div class="mypage-in">
                            <p class="info-top">회원정보</p>

                            <div class="info-in">
                                <p class="info-nm">업체명</p>
                                <p class="info-value" id="name"></p>
                            </div>

                            <div class="info-in">
                                <p class="info-nm">주소</p>
                                <p class="info-value" id="addr1"></p>
                            </div>

                            <div class="info-in">
                                <p class="info-nm">상세주소</p>
                                <p class="info-value" id="addr2"></p>
                            </div>

                            <div class="info-in">
                                <p class="info-nm">담당자명</p>
                                <input
                                    type="text"
                                    placeholder="담당자명을 입력해주세요."
                                    id="user_name"
                                />
                            </div>

                            <div class="info-in">
                                <p class="info-nm">휴대폰 번호</p>
                                <input
                                    type="text"
                                    id="phone"
                                    maxlength="11"
                                    inputmode="numeric"
                                    pattern="[0-9]*"
                                    placeholder="('-' 를 제외하고 입력해주세요.)"
                                />
                            </div>

                            <div class="info-in">
                                <p class="info-nm">비밀번호</p>
                                <input
                                    type="password"
                                    placeholder="비밀번호 변경 시 입력해주세요."
                                    id="pw"
                                />
                            </div>
                        </div>
                        <div class="btn-mypage">
                            <p
                                class="btn-mypage-b"
                                style="margin-right: 10px"
                                onclick="modify()"
                            >
                                수정
                            </p>
                            <p
                                class="btn-mypage-g"
                                style="margin-left: 10px"
                                onclick="location.href='user_unregister.html'"
                            >
                                회원탈퇴
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
