<!DOCTYPE html>
<html lang="ko">
    <head>

</head>

    <script>
        let arr = [];
        const currentUrl = "inquiry";
        const currentApi = "/inquiry";
        const page = params.get("page") || "1";

        $(function () {
            if (params.get("page") == null) {
                location.href = `${currentUrl}_list.html?page=1`;
            } else {
                getList();
            }
        });

        // 리스트
        function getList() {
            Common.sendAxios(`${currentApi}?page=${page}`)
                .then(async (json) => {
                    if (json.code != 200) return;

                    const { data: list, searchVO } = json; // 구조 분해 할당 (가독성 향상)
                    const $list = $("#list"); // jQuery 객체 캐싱

                    if (!list || list.length === 0) {
                        $list.html(
                            "<tr><td colspan='7'>문의 내역이 없습니다.</td></tr>"
                        );
                        return false;
                    }

                    $list.empty();
                    Common.renderPaging(searchVO);

                    const info = JSON.parse(localStorage.getItem("info"));
                    const current_account_id = info?.account_id;

                    list.forEach((data, i) => {
                        // 1. 기본 데이터 가공 및 null 체크
                        const id = data.inquiry_id;
                        const listno =
                            searchVO.totalCnt -
                            ((searchVO.page - 1) * searchVO.recordSize + i);

                        const title = data.title?.trim() || "-";
                        const content =
                            data.content?.replace(/<br>/g, " ").trim() || "-";
                        const created_at =
                            data.created_at?.substring(0, 10) || "-";

                        // 2. 상태 및 타입 텍스트 결정 (삼항 연산자 활용)
                        const isAnswered = data.status === "ANSWERED";
                        const status_text = isAnswered ? "완료" : "미완료";
                        const status_class = isAnswered ? "delivery-s" : "";
                        const inquiry_text =
                            data.inquiry === "SALE" ? "판매" : "구매";

                        // 3. 사용자 이름 스타일 결정
                        const isMyPost = current_account_id == data.account_id;
                        const userStyle = isMyPost
                            ? 'style="color:#FFA01A"'
                            : "";

                        // 4. 템플릿 리터럴을 이용한 한 번의 HTML 생성 (가장 전문가스러운 방식)
                        const trHtml = `
                            <tr id="tr${id}" val="${id}" onclick="detail(event, ${id})">
                                <td>${listno}</td>
                                <td>${inquiry_text}</td>
                                <td>${title}</td>
                                <td>${content}</td>
                                <td ${userStyle}>${data.user_name}</td>
                                <td>${created_at}</td>
                                <td class="${status_class}">${status_text}</td>
                            </tr>
                        `;

                        $list.append(trHtml);
                    });
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        // paging 이동
        function pageMove(pageIndex) {
            location.href = `${currentUrl}_list.html?page=${pageIndex}`;
        }

        // 상세
        function detail(e, id) {
            var targetId = $(e.target).attr("id") || "";

            if (targetId.includes("row")) {
                return;
            }

            const queryString = window.location.search;
            location.href = `${currentUrl}_detail.html?id=${id}${queryString.replace(
                "?",
                "&"
            )}`;
        }
    </script>
