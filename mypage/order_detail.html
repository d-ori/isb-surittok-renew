    <script>
        const id = params.get("id");
        const currentUrl = "order";
        const currentApi = "/youhu";
        let info = JSON.parse(localStorage.getItem("info"));

        $(function () {
            // 초기 상태 추가
            history.pushState(null, document.title, location.href);

            // 뒤로가기 시 이벤트
            window.addEventListener("popstate", function (event) {
                backPage();
            });

            getDetail();
        });

        function getDetail() {
            Common.sendAxios(`${currentApi}/${id}`)
                .then(async (json) => {
                    const data = json.data;

                    const cmpn_name = data.cmpn_name;
                    const name = data.name;
                    const price = data.price;
                    const qntty = data.qntty;
                    const standard = data.standard;
                    const phone = data.phone;
                    const addr1 = data.addr1;
                    const addr2 = data.addr2;
                    const note = data.note.replaceAll("<br>", "\r\n");
                    const youhu_status = data.youhu_status;
                    const type = data.type;

                    const created_at = data.created_at;
                    const completed_at = data.completed_at;

                    const radio = document.querySelector(
                        `input[name="division"][value="${youhu_status}"]`
                    );

                    if (radio) {
                        // disabled 상태 풀었다가
                        radio.disabled = false;
                        // 체크
                        radio.checked = true;
                        // 다시 disabled로 잠금
                        radio.disabled = true;
                    }

                    $("#cmpn_name").val(cmpn_name);
                    $("#name").val(name);
                    if (type == "Y") {
                        $("#price").val(Common.numberWithCommas(price) + " 원");
                    } else {
                        $("#price").val("가격 협의");
                    }
                    $("#qntty").val(Common.numberWithCommas(qntty) + " 개");
                    $("#standard").val(standard);
                    $("#phone").val(Common.formatPhoneNumber(phone));
                    $("#addr1").val(addr1);
                    $("#addr2").val(addr2);
                    $("#note").val(note);
                    $("#created_at").val(created_at);
                    $("#completed_at").val(completed_at);

                    const fileDto = json.searchVO;

                    for (let i = 0; i < fileDto.length; i++) {
                        const file = fileDto[i];

                        if (file.upload_column == "youhu") {
                            $("#preview_youhu").append(
                                `<li><img src="${file.upload_url}"></li>`
                            );
                        }
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function modify() {
            const queryString = window.location.search;
            location.href = `${currentUrl}_form.html${queryString}`;
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            params.delete("id");

            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_list.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_list.html`;
            }
        }
    </script>

        <script>
            function readURL_youhu(input) {
                const files = Array.from(input.files);

                // 새로운 파일들을 fileList에 추가
                files.forEach((file) => {
                    if (fileList_youhu.length < 10) {
                        fileList_youhu.push(file);
                    }
                });

                // 미리보기 UI를 fileList 순서대로 렌더링
                renderPreview_youhu();
            }

            async function renderPreview_youhu() {
                const previewContainer =
                    document.getElementById("preview_youhu");
                previewContainer.innerHTML = ""; // 기존 UI 초기화

                // fileList의 순서대로 미리보기 UI를 그린다
                for (let i = 0; i < fileList_youhu.length; i++) {
                    const file = fileList_youhu[i];

                    // FileReader를 사용해 이미지를 읽고 미리보기 UI에 추가
                    const reader = new FileReader();
                    await new Promise((resolve) => {
                        reader.onload = function (e) {
                            const li = document.createElement("li");
                            li.setAttribute("draggable", "true");
                            li.classList.add("image-item");

                            // 각 div에 고유한 index 부여 (data-index 속성 활용)
                            li.setAttribute("data-index", i);

                            const img = document.createElement("img");
                            img.src = e.target.result;

                            const btn = document.createElement("button");
                            btn.innerText = "X";
                            btn.classList.add("delete-btn");
                            btn.onclick = function () {
                                fileList_youhu.splice(i, 1); // fileList에서 해당 파일 삭제
                                renderPreview_youhu(); // 미리보기 UI 다시 렌더링
                            };

                            li.appendChild(img);
                            li.appendChild(btn);
                            previewContainer.appendChild(li);

                            resolve(); // 파일 읽기 완료 후 resolve 호출
                        };

                        reader.readAsDataURL(file); // 파일을 읽어서 비동기적으로 처리
                    });
                }

                // 이제 updateSortable 호출
                updateSortable_youhu();
            }

            function imgClear_youhu() {
                fileList_youhu = [];
                renderPreview_youhu();
            }

            function updateSortable_youhu() {
                $("#preview_youhu")
                    .sortable({
                        update: function () {
                            let newOrder = [];

                            // 새로운 순서대로 fileList 업데이트
                            $("#preview_youhu .image-item").each(function () {
                                let index = $(this).attr("data-index");
                                // 새로운 순서대로 fileList를 업데이트
                                newOrder.push(fileList_youhu[index]);
                            });

                            // 새로운 순서대로 fileList를 갱신
                            fileList_youhu = [...newOrder];

                            // 순서가 변경된 후 미리보기 UI 업데이트
                            setTimeout(function () {
                                renderPreview_youhu(); // 딜레이 후 순서가 제대로 반영되도록 미리보기 UI 다시 렌더링
                            }, 200); // 200ms 정도 기다린 후 업데이트
                        },
                    })
                    .disableSelection();
            }
        </script>

        <div
            id="imgModal"
            style="
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                justify-content: center;
                align-items: center;
            "
        >
            <img id="modalImg" src="" style="max-width: 90%; max-height: 90%" />
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const lists = document.querySelectorAll(".img-list"); // 모든 img-list 선택
                if (!lists.length) return;

                const modal = document.getElementById("imgModal");
                const modalImg = document.getElementById("modalImg");

                lists.forEach((list) => {
                    list.addEventListener("click", (e) => {
                        if (e.target.tagName === "IMG") {
                            modalImg.src = e.target.src;
                            modal.style.display = "flex";
                        }
                    });
                });

                modal.addEventListener("click", () => {
                    modal.style.display = "none";
                    modalImg.src = "";
                });
            });
        </script>
