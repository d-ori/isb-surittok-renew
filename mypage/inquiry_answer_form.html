<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>A/S 이력관리시스템</title>
        <link rel="shortcut icon" href="../img/ico_shortIcon.png" />
        <script
            src="https://code.jquery.com/jquery-3.6.1.min.js"
            integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ="
            crossorigin="anonymous"
        ></script>
        <script src="../js/axios.min.js"></script>
        <script src="../js/app-shell.js?ver=1"></script>
        <script src="../js/common.js"></script>
        <link rel="stylesheet" href="../css/modern.css" />
        <link rel="stylesheet" href="../css/modern-dashboard.css" />
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
        <link rel="stylesheet" href="../css/common.css" />
        <link rel="stylesheet" href="../css/legacy-forms-lists.css" />
    </head>

    <script>
        const youhu_status = params.get("youhu_status");
        const name = params.get("name");
        // const youhu_id = params.get("youhu_id");
        const id = params.get("id");
        const currentUrl = "inquiry";
        const currentApi = "/inquiry";

        $(function () {
            if (id != null) {
                getDetail();
                $("#saveBtn").html("수정");
            } else {
                $("#title").val(`(${name} 문의) `);
                $("#deleteBtn").css("display", "none");
                $("#saveBtn").html("등록");
            }
        });

        function getDetail() {
            Common.sendAxios(`${currentApi}${id}`)
                .then(async (json) => {
                    const data = json.data;

                    const title = data.title;
                    const content = (data.content || "").replaceAll(
                        "<br>",
                        "\r\n"
                    );
                    const created_at = data.created_at;

                    $("#title").val(title);
                    $("#content").val(content);
                    $("#created_at").html(created_at);
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function saveClick() {
            const formData = new FormData();
            const title = $("#title").val();
            const content = ($("#content").val() || "").replaceAll(
                "<br>",
                "\r\n"
            );
            let method = "";

            if (Common.nullCheck(title, "title", "제목")) return;

            formData.append("title", title);
            // formData.append("youhu_id", youhu_id);
            formData.append("content", content);
            formData.append("inquiry", youhu_status);

            if (id != null) {
                method = "/put";
                formData.append("inquiry_id", id);
            }

            Common.sendAxios(`${currentApi}${method}`, formData)
                .then(async (json) => {
                    if (json.code == 200) {
                        alert(json.msg);

                        location.href = `${currentUrl}_list.html`;
                    } else if (json.code == 202) {
                        alert(json.msg);
                        $(`#${json.data}`).focus();
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function deletion() {
            if (
                confirm(
                    "정말 삭제하시겠습니까?\n한번 삭제한 데이터는 복구 할 수 없습니다."
                ) == true
            ) {
                const formData = new FormData();
                formData.append("id_list", id);

                Common.sendAxios(`${currentApi}/delete`, formData)
                    .then(async (json) => {
                        alert(json.msg);
                        location.href = `${currentUrl}_list.html`;
                    })
                    .catch((err) => {
                        console.error("ERROR : ", err);
                    });
            }
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_detail.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_detail.html`;
            }
        }
    </script>

    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div class="contents scroll-custom">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>문의내역</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">HOME > 마이페이지 > 문의내역</p>
                    </div>
                </div>
                <div class="contents-in contents-mypage">
                    <div class="menu-mypage">
                        <div class="menu-mypage-top">
                            <img src="../img/ico_mypage.png" />
                            <p>마이페이지</p>
                        </div>
                        <ul>
                            <li>
                                <p onclick="location.href='user_info.html'">
                                    정보관리
                                </p>
                            </li>
                            <li>
                                <p onclick="location.href='order_list.html'">
                                    주문정보
                                </p>
                            </li>
                            <li class="on">
                                <p onclick="location.href='inquiry_list.html'">
                                    문의내역
                                </p>
                            </li>
                        </ul>
                    </div>
                    <div class="order-wrap inquiry-wrap">
                        <div class="mypage-in">
                            <p class="info-top" style="margin-bottom: 0px">
                                문의하기
                            </p>

                            <div class="inquiry-info">
                                <p class="inquiry-title">제목</p>
                                <input type="text" id="title" />
                            </div>
                            <div class="inquiry-info-txt">
                                <textarea
                                    id="content"
                                    placeholder="문의 내용을 입력해주세요. (필요 시 연락처 기재)"
                                ></textarea>
                            </div>
                            <div
                                class="btn-wrap"
                                style="
                                    padding-bottom: 20px;
                                    top: auto;
                                    bottom: 20px;
                                "
                            >
                                <div class="btn btn-del" onclick="backPage()">
                                    <p>뒤로</p>
                                </div>
                                <div
                                    class="btn btn-del"
                                    id="deleteBtn"
                                    onclick="deletion()"
                                >
                                    <p>삭제</p>
                                </div>
                                <div class="btn btn-add" onclick="saveClick()">
                                    <p id="saveBtn">수정</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
