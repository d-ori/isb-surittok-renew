<script>
    (function () {
        var MOON_SVG =
            '<svg class="top-toolbar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
        var SUN_SVG =
            '<svg class="top-toolbar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>';

        function syncTopThemeControls() {
            var dark =
                document.documentElement.getAttribute("data-theme") === "dark";
            $("#top-theme-icon").html(dark ? SUN_SVG : MOON_SVG);
            $(".theme-btn")
                .attr("data-tooltip", dark ? "라이트 모드" : "다크 모드")
                .attr("aria-label", dark ? "라이트 모드" : "다크 모드");
        }

        window.__syncTopThemeControls = syncTopThemeControls;
        window.__topThemeMoonSvg = MOON_SVG;
        window.__topThemeSunSvg = SUN_SVG;

        $(function () {
            var info = JSON.parse(localStorage.getItem("info"));
            if (info && info.name) $("#admin_name").html(info.name);
            if (info && info.cmpn_name) {
                $("#cmpn_nm").html(info.cmpn_name);
            } else {
                $("#cmpn_nm").html("A/S 이력관리시스템");
            }
            syncTopThemeControls();
        });
    })();

    window.toggleMenu = function () {
        if ($(window).width() > 1024) {
            $(".menu").toggleClass("closed");
        } else {
            $(".menu").toggleClass("open");
            if ($(".menu").hasClass("open")) {
                if ($("#menu-overlay").length === 0) {
                    $(".main").append(
                        '<div id="menu-overlay" style="position:absolute; inset:0; background:rgba(0,0,0,0.4); z-index:800; cursor:pointer;" onclick="toggleMenu()"></div>'
                    );
                } else {
                    $("#menu-overlay").show();
                }
            } else {
                $("#menu-overlay").hide();
            }
        }
    };

    window.topToggleTheme = function () {
        if (typeof toggleTheme === "function" && document.querySelector(".theme-toggle-btn")) {
            toggleTheme();
        } else {
            var currentTheme = document.documentElement.getAttribute("data-theme");
            var newTheme = currentTheme === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", newTheme);
            localStorage.setItem("theme", newTheme);

            var btn = document.querySelector(".theme-toggle-btn");
            if (btn) {
                if (newTheme === "dark") {
                    btn.innerHTML = '<span id="theme-icon">☀️</span> Light Mode';
                } else {
                    btn.innerHTML = '<span id="theme-icon">🌙</span> Dark Mode';
                }
            }
        }

        if (typeof window.__syncTopThemeControls === "function") {
            window.__syncTopThemeControls();
        }
    };
</script>

<div class="top-left">
    <div class="hamburger" onclick="toggleMenu()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </div>

    <div class="top-company" onclick="location.href = '/gongbang_home/home.html';">
        <span class="top-company-mark" aria-hidden="true"></span>
        <p id="cmpn_nm"></p>
    </div>
</div>

<div class="top-right">
    <div class="profile-info">
        <div class="admin-greeting">
            <span id="admin_name">관리자</span>님, 안녕하세요!
        </div>

        <div class="top-actions">
            <div
                class="top-btn top-btn--icon theme-btn"
                role="button"
                tabindex="0"
                data-tooltip="다크 모드"
                aria-label="다크 모드"
                onclick="topToggleTheme()"
            >
                <span id="top-theme-icon"></span>
            </div>

            <div
                class="top-btn top-btn--icon"
                role="button"
                tabindex="0"
                data-tooltip="마이페이지"
                aria-label="마이페이지"
                onclick="location.href='/mypage/user_info.html';"
            >
                <svg class="top-toolbar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>

            <div class="top-btn logout" onclick="logout()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span class="btn-text">로그아웃</span>
            </div>
        </div>
    </div>
</div>
