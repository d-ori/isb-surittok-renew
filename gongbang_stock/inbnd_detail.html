<!doctype html>
<html lang="ko">
    <head>
        <script src="../js/head-common.js?ver=1"></script>
<!-- 카카오맵 연동 -->
        <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    </head>

    <script>
        const id = params.get("id");
        const currentUrl = "inbnd";
        const currentApi = "/inbnd";

        $(function () {
            getDetail();
        });

        function getDetail() {
            Common.sendAxios(`${currentApi}/${id}`)
                .then(async (json) => {
                    const data = json.data;

                    const prch_name = data.prch_name?.trim() || "-";
                    const prcitm_name = data.prcitm_name?.trim() || "-";
                    const item_code = data.item_code?.trim() || "-";
                    const inbnd_qty = Common.numberWithCommas(data.inbnd_qty);
                    const inbnd_price = Common.numberWithCommas(
                        data.inbnd_price,
                    );
                    const amount = Common.numberWithCommas(data.amount);
                    const note = data.inbnd_note?.replaceAll("<br>", "\r\n");
                    const inbnd_at = data.inbnd_at.substring(0, 10);
                    const standard = data.standard?.trim() || "-";

                    $("#inbnd_at").val(inbnd_at);
                    $("#prch_name").val(prch_name);
                    $("#prcitm_name").val(prcitm_name);
                    $("#item_code").val(item_code);
                    $("#inbnd_qty").val(inbnd_qty);
                    $("#inbnd_price").val(inbnd_price);
                    $("#amount").val(amount);
                    $("#note").val(note);
                    $("#standard").val(standard);

                    const type = data.type;
                    $(`input[name='type'][value='${data.type}']`).prop(
                        "checked",
                        true,
                    );
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function modify() {
            const queryString = window.location.search;
            location.href = `${currentUrl}_form.html${queryString}`;
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            params.delete("id");

            const queryString = params.toString();

            if (queryString) {
                if (queryString.includes("sort=t.")) {
                    location.href = `warehouse_list.html?${queryString}`;
                } else {
                    location.href = `${currentUrl}_list.html?${queryString}`;
                }
            } else {
                location.href = `${currentUrl}_list.html`;
            }
        }
    </script>

    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div class="contents contents-add detail-view">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>입고 관리</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">HOME > 재고 관리 > 입고 관리</p>
                    </div>
                </div>
                <div
                    class="contents-in scroll-custom"
                    style="height: calc(100vh - 350px)"
                >
                    <div class="info-in info-in-modify-info">
                        <p>접수 타입</p>

                        <input
                            type="radio"
                            name="type"
                            class="input-radio"
                            value="1"
                            disabled
                        />
                        <p
                            class="info-title"
                            style="
                                background-color: #fff;
                                justify-content: left;
                                width: 80px;
                                background: none;
                                justify-content: left;
                                padding-left: 10px;
                            "
                        >
                            입고
                        </p>

                        <input
                            type="radio"
                            name="type"
                            class="input-radio"
                            value="2"
                            disabled
                        />
                        <p
                            class="info-title"
                            style="
                                background-color: #fff;
                                justify-content: left;
                                width: 80px;
                                background: none;
                                justify-content: left;
                                padding-left: 10px;
                            "
                        >
                            서비스
                        </p>
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>입고일자</p>
                        <input type="text" id="inbnd_at" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>품목명</p>
                        <input type="text" id="prcitm_name" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>매입처명</p>
                        <input type="text" id="prch_name" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>품목코드</p>
                        <input type="text" id="item_code" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>규격</p>
                        <input type="text" id="standard" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>단가 (VAT 포함)</p>
                        <input type="text" id="inbnd_price" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>입고 수량</p>
                        <input type="text" id="inbnd_qty" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>입고 총 금액 (원)</p>
                        <input type="text" id="amount" readonly />
                    </div>

                    <div class="info-in info-in-rm info-in-modify-info">
                        <p>비고</p>
                        <textarea
                            class="scroll-custom"
                            id="note"
                            readonly
                        ></textarea>
                    </div>
                </div>

                <div class="btn-wrap" style="margin-top: 21px; right: 33px">
                    <div class="btn btn-del" onclick="backPage()">
                        <p>뒤로</p>
                    </div>
                    <div class="btn btn-add" onclick="modify()">
                        <p>수정</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
