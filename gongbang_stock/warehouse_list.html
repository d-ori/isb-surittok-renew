<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>A/S 이력관리시스템</title>
        <link rel="shortcut icon" href="../img/ico_shortIcon.png" />
        <script
            src="https://code.jquery.com/jquery-3.6.1.min.js"
            integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ="
            crossorigin="anonymous"
        ></script>
        <script src="../js/axios.min.js"></script>
        <script src="../js/app-shell.js?ver=1"></script>
        <script type="text/javascript" src="../js/common.js?ver=1"></script>
        <link rel="stylesheet" href="../css/modern.css" />
        <link rel="stylesheet" href="../css/modern-dashboard.css" />
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
        <link rel="stylesheet" href="../css/common.css" />
        <link rel="stylesheet" href="../css/legacy-forms-lists.css" />

        <!-- Sheet JS -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.14.3/xlsx.full.min.js"></script>
        <!-- FileSaver savaAs 이용 -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.min.js"></script>
    </head>

    <script>
        let arr = [];
        const currentUrl = "warehouse";
        const currentApi = "/warehouse";
        const sort =
            params.get("sort") == undefined
                ? decodeURI("t.work_at DESC")
                : decodeURI(params.get("sort"));
        const page = params.get("page") || "1";
        const keyword = decodeURI(params.get("keyword")) || "";
        const cate = decodeURI(params.get("cate")) || "";

        $(function () {
            if (params.get("page") == null) {
                location.href = `${currentUrl}_list.html?page=1&keyword=&sort=${sort}&cate=`;
            } else {
                let [sortColumn, sortDir] = sort.split(" ");
                sortColumn = sortColumn.replace(".", "_");

                const arrowIcon =
                    sortDir === "DESC"
                        ? "ico_arrow_down.png"
                        : "ico_arrow_up.png";

                $(`#sort_${sortColumn}`).attr("src", `../img/${arrowIcon}`);

                getList();
            }
        });

        // sort
        function sortClick(select) {
            // 현재 sort 상태가 예: "name DESC" 또는 "name"
            const [currentColumn, currentDirection] = sort.split(" ");

            // 같은 컬럼 클릭 시 정렬 방향 토글, 다른 컬럼 클릭 시 DESC로 시작
            const newDirection =
                currentColumn === select
                    ? currentDirection === "DESC"
                        ? ""
                        : "DESC"
                    : "DESC";

            // 정렬 문자열 구성 (기본 오름차순이면 컬럼명만 넘김)
            const newSort = newDirection ? `${select} ${newDirection}` : select;

            location.href = `${currentUrl}_list.html?page=${page}&keyword=${keyword}&sort=${newSort}&cate=${cate}`;
        }

        // 리스트
        function getList() {
            $("#search").val(keyword);
            $("#cate").val(cate);

            Common.sendAxios(
                `${currentApi}?keyword=${keyword}&page=${page}&sort=${sort}&cate=${$(
                    "#cate",
                ).val()}`,
            )
                .then(async (json) => {
                    if (json.code == 200) {
                        const list = json.data;
                        const searchVO = json.searchVO;

                        if (list.length == 0) {
                            $("#list").append(
                                $(
                                    `<tr><td colspan='${$("#list").closest("table").find("colgroup col").length}'>검색 결과가 없습니다.</td></tr>`,
                                ),
                            );
                            return false;
                        }

                        $("#list").empty();

                        Common.renderPaging(searchVO);

                        for (let i = 0; i < list.length; i++) {
                            const data = list[i];
                            const id = data.id;
                            const bnd_type = data.bnd_type;
                            const typeValue = data.type;
                            const typeText =
                                bnd_type === "입고"
                                    ? typeValue == 1
                                        ? "입고"
                                        : typeValue == 2
                                          ? "서비스"
                                          : typeValue
                                    : typeValue == 1
                                      ? "기사"
                                      : typeValue == 2
                                        ? "자재 판매"
                                        : typeValue == 3
                                          ? "서비스"
                                          : typeValue;

                            let tr = $(
                                `<tr id="tr${id}" class="list_check" val="${id}" onclick="detail(event, ${id}, '${bnd_type}')"${
                                    bnd_type === "입고"
                                        ? ""
                                        : ' style="background:#F3F7FF;"'
                                }>`,
                            );

                            const listno =
                                searchVO.totalCnt -
                                ((searchVO.page - 1) * searchVO.recordSize + i);
                            const prch_name = data.prch_name?.trim() || "-";
                            const prcitm_name = data.prcitm_name?.trim() || "-";
                            const item_code = data.item_code?.trim() || "-";
                            const work_at = data.work_at.substring(0, 10);

                            const qty = Common.numberWithCommas(data.qty);
                            const price = Common.numberWithCommas(data.price);
                            const amount = Common.numberWithCommas(data.amount);
                            const standard = data.standard?.trim() || "-";

                            tr.append($($(`<td>${listno}</td>`)));
                            tr.append($(`<td>${bnd_type}</td>`));
                            tr.append($(`<td>${work_at}</td>`));
                            tr.append($(`<td>${typeText}</td>`));
                            tr.append($(`<td>${prch_name}</td>`));
                            tr.append($(`<td>${prcitm_name}</td>`));
                            tr.append($(`<td>${item_code}</td>`));
                            tr.append($(`<td>${standard}</td>`));
                            tr.append($(`<td>${qty} 개</td>`));
                            tr.append($(`<td>${price} 원</td>`));
                            tr.append($(`<td>${amount} 원</td>`));

                            $("#list").append(tr);
                        }

                        check();
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        // paging 이동
        function pageMove(pageIndex) {
            location.href = `${currentUrl}_list.html?page=${pageIndex}&keyword=${keyword}&sort=${sort}&cate=${cate}`;
        }

        // 체크박스
        function check() {
            $("input[name=_selected_all_]").on("change", function () {
                $("input[name=_selected_]").prop("checked", this.checked);
                if (this.checked) {
                    $("tr").addClass("selected-row");
                } else {
                    $("tr").removeClass("selected-row");
                }
            });

            $("input[name=_selected_]").on("change", function () {
                $(this).closest("tr").toggleClass("selected-row", this.checked);

                const allChecked =
                    $("input[name=_selected_]").length ===
                    $("input[name=_selected_]:checked").length;
                $("input[name=_selected_all_]").prop("checked", allChecked);
            });
        }

        // 선택 → 수정 → back, 선택해제
        function uncheck() {
            $(":checkbox:checked").prop("checked", false);
        }

        // search - Enter
        function enterkey() {
            if (window.event.keyCode == 13) {
                search();
            }
        }

        // 검색
        function search() {
            location.href = `${currentUrl}_list.html?page=1&keyword=${decodeURI(
                $("#search").val(),
            )}&sort=${sort}&cate=${$("#cate").val()}`;
        }

        // 선택 삭제
        function deletion() {
            let id_list = "";

            const selectedRows = document.querySelectorAll(
                ".list_check.selected-row",
            );

            for (let i = 0; i < selectedRows.length; i++) {
                if (i == selectedRows.length - 1) {
                    id_list += selectedRows[i].getAttribute("val");
                } else {
                    id_list += selectedRows[i].getAttribute("val") + ",";
                }
            }

            if (selectedRows.length > 0) {
                if (
                    confirm(
                        "정말 삭제하시겠습니까?\n한번 삭제한 데이터는 복구 할 수 없습니다.",
                    ) == true
                ) {
                    const formData = new FormData();
                    formData.append("id_list", id_list);

                    Common.sendAxios(`${currentApi}/delete`, formData)
                        .then(async (json) => {
                            alert(json.msg);
                            location.reload();
                        })
                        .catch((err) => {
                            console.error("ERROR : ", err);
                        });
                }
            } else {
                alert("데이터를 선택해주세요.");
            }
        }

        // 상세
        function detail(e, id, bnd_type) {
            var targetId = $(e.target).attr("id") || "";

            if (targetId.includes("row")) {
                return;
            }

            const queryString = window.location.search;
            if (bnd_type == "입고") {
                location.href = `inbnd_detail.html?id=${id}${queryString.replace(
                    "?",
                    "&",
                )}`;
            } else {
                location.href = `outbnd_detail.html?id=${id}${queryString.replace(
                    "?",
                    "&",
                )}`;
            }
        }

        // 엑셀 다운로드
        function excel_download() {
            Common.sendAxios(
                `${currentApi}?keyword=${keyword}&page=${page}&sort=${sort}&cate=${cate}&usePageNavy=false`,
            )
                .then(async (json) => {
                    const list = json.data;

                    if (list.length == 0) {
                        alert("조회된 결과가 없습니다.");
                        return;
                    }

                    const excelData = list.map((data) => ({
                        구분: data.bnd_type,
                        입출고일: data.work_at.substring(0, 10),
                        매입처명: data.prch_name?.trim() || "-",
                        품목명: data.prcitm_name?.trim() || "-",
                        품목코드: data.item_code?.trim() || "-",
                        규격: data.standard?.trim() || "-",
                        수량: Common.numberWithCommas(data.qty),
                        "단가 (VAT 포함)": Common.numberWithCommas(data.price),
                        "총 금액": Common.numberWithCommas(data.amount),
                        비고: data.note.split("<br>").join(" ")?.trim() || "-",
                    }));

                    const sheet = XLSX.utils.json_to_sheet(excelData);
                    const wb = XLSX.utils.book_new();
                    const str = "입출고 관리";
                    XLSX.utils.book_append_sheet(wb, sheet, str);

                    const wbout = XLSX.write(wb, {
                        bookType: "xlsx",
                        type: "binary",
                    });
                    const fileName = `${str}_${Common.getCurrentFormattedTime()}.xlsx`;

                    saveAs(
                        new Blob([s2ab(wbout)], {
                            type: "application/octet-stream",
                        }),
                        fileName,
                    );
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function s2ab(s) {
            var buf = new ArrayBuffer(s.length); //convert s to arrayBuffer
            var view = new Uint8Array(buf); //create uint8array as viewer
            for (var i = 0; i < s.length; i++) view[i] = s.charCodeAt(i) & 0xff; //convert to octet
            return buf;
        }
    </script>

    <body onLoad="uncheck()">
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div class="contents">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>입출고 관리</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">HOME > 재고 관리 > 입출고 관리</p>
                    </div>
                </div>
                <div class="search">
                    <img src="../img/ico_search.png" class="ico-search" />
                    <select class="search-select" id="cate">
                        <option value="">전체</option>
                        <option value="prch_name">매입처</option>
                        <option value="prcitm_name">품목명</option>
                        <option value="item_code">품목코드</option>
                    </select>
                    <div class="search-in">
                        <input
                            type="text"
                            id="search"
                            placeholder="검색어를 입력해주세요."
                            class="search-input"
                            onkeypress="enterkey()"
                        />
                        <p class="btn btn-search" onclick="search()">검색</p>
                    </div>
                    <div class="btn-wrap">
                        <div
                            class="btn btn-excel btn-excel-down"
                            onclick="excel_download()"
                        >
                            <p>엑셀 다운로드</p>
                        </div>
                        <div
                            class="btn btn-add"
                            onclick="location.href = `inbnd_form.html`"
                        >
                            <p>입고 처리</p>
                        </div>
                        <div
                            class="btn btn-add"
                            onclick="location.href = `outbnd_form.html`"
                        >
                            <p>출고 처리</p>
                        </div>
                    </div>
                </div>
                <div class="contents-in">
                    <div class="list">
                        <table>
                            <colgroup>
                                <col style="width: 100px" />
                                <col style="width: 100px" />
                                <col style="width: 200px" />
                                <col style="width: 100px" />
                                <col style="width: 16%" />
                                <col style="width: 16%" />
                                <col style="width: 16%" />
                                <col style="width: 16%" />
                                <col style="width: 12%" />
                                <col style="width: 150px" />
                                <col style="width: 12%" />
                            </colgroup>
                            <tbody>
                                <tr class="t-header">
                                    <th>No.</th>
                                    <th>구분</th>
                                    <th>
                                        입출고일
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_t_work_at"
                                            onclick="sortClick('t.work_at')"
                                        />
                                    </th>
                                    <th>타입</th>
                                    <th>
                                        매입처
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_t_prch_name"
                                            onclick="sortClick('t.prch_name')"
                                        />
                                    </th>
                                    <th>
                                        품목명
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_t_prcitm_name"
                                            onclick="sortClick('t.prcitm_name')"
                                        />
                                    </th>
                                    <th>
                                        품목코드
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_t_item_code"
                                            onclick="sortClick('t.item_code')"
                                        />
                                    </th>
                                    <th>
                                        규격
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_t_standard"
                                            onclick="sortClick('t.standard')"
                                        />
                                    </th>
                                    <th>
                                        수량
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_t_qty"
                                            onclick="sortClick('t.qty')"
                                        />
                                    </th>
                                    <th>
                                        단가 (VAT 포함)
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_t_price"
                                            onclick="sortClick('t.price')"
                                        />
                                    </th>
                                    <th>
                                        총 금액
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_t_amount"
                                            onclick="sortClick('t.amount')"
                                        />
                                    </th>
                                </tr>
                            </tbody>

                            <tbody id="list"></tbody>
                        </table>
                    </div>
                    <div class="paging">
                        <div class="paging-inner" id="pagingArea"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
