<!doctype html>
<html lang="ko">
    <head>
        <script src="../js/head-common.js?ver=1"></script>
</head>

    <script>
        const id = params.get("id");
        const currentUrl = "pitem";
        const currentApi = "/pitem";

        $(function () {
            getPrchList();

            if (id != null) {
                $("#saveBtn").html("수정");
            } else {
                $(".btn-del").css("display", "none");
                $("#saveBtn").html("등록");
            }
        });

        function getPrchList() {
            Common.sendAxios(`/prch?keyword=&page=1&sort=&usePageNavy=false`)
                .then(async (json) => {
                    var list = json.data;

                    $("#prch_list").append(
                        '<option value="">매입처를 선택해주세요.</option>',
                    );

                    for (var i = 0; i < list.length; i++) {
                        var data = list[i];
                        $("#prch_list").append(
                            '<option value="' +
                                data.prch_id +
                                '">' +
                                data.name +
                                "</option>",
                        );
                    }

                    if (id != null) {
                        getDetail();
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function getDetail() {
            Common.sendAxios(`${currentApi}/${id}`)
                .then(async (json) => {
                    const data = json.data;

                    const name = data.name;
                    const price = data.price;
                    const prch_id = data.prch_id;
                    const sft_stc = data.sft_stc;
                    const item_code = data.item_code;

                    $("#name").val(name);
                    $("#price").val(price);
                    $("#prch_list").val(prch_id);
                    $("#sft_stc").val(sft_stc);
                    $("#item_code").val(item_code);
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function saveClick() {
            const formData = new FormData();
            const name = $("#name").val();
            let price = $("#price").val();
            let sft_stc = $("#sft_stc").val();
            const prch_id = $("#prch_list").val();
            let method = "";
            const item_code = $("#item_code").val();

            if (Common.nullCheck(prch_id, "prch_id", "매입처")) return;
            if (Common.nullCheck(name, "name", "품목명")) return;

            if (!price || isNaN(price)) {
                price = 0;
            } else {
                price = parseInt(price, 10);
            }

            if (!sft_stc || isNaN(sft_stc)) {
                sft_stc = 0;
            } else {
                sft_stc = parseInt(sft_stc, 10);
            }

            formData.append("name", name);
            formData.append("prch_id", prch_id);
            formData.append("price", price);
            formData.append("sft_stc", sft_stc);
            formData.append("item_code", item_code);

            if (id != null) {
                method = "/put";
                formData.append("prcItm_id", id);
            }

            Common.sendAxios(`${currentApi}${method}`, formData)
                .then(async (json) => {
                    if (json.code == 200) {
                        alert(json.msg);

                        if (id == null) {
                            const params = new URLSearchParams(
                                window.location.search,
                            );
                            params.delete("id");

                            const queryString = params.toString();
                            location.href = `${currentUrl}_list.html${queryString}`;
                        } else {
                            const queryString = window.location.search;
                            location.href = `${currentUrl}_detail.html${queryString}`;
                        }
                    } else if (json.code == 202) {
                        alert(json.msg);
                        $(`#${json.data}`).focus();
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function deletion() {
            if (
                confirm(
                    "정말 삭제하시겠습니까?\n한번 삭제한 데이터는 복구 할 수 없습니다.",
                ) == true
            ) {
                const formData = new FormData();
                formData.append("id_list", id);

                Common.sendAxios(`${currentApi}/delete`, formData)
                    .then(async (json) => {
                        alert(json.msg);
                        location.href = `${currentUrl}_list.html`;
                    })
                    .catch((err) => {
                        console.error("ERROR : ", err);
                    });
            }
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_detail.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_detail.html`;
            }
        }
    </script>

    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div class="contents contents-add detail-view">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>매입 품목 관리</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">HOME > 매입처 관리 > 매입 품목 관리</p>
                    </div>
                </div>
                <div class="contents-in scroll-custom">
                    <div class="info-in">
                        <p>
                            <span class="r-value">*&nbsp;</span>
                            매입처
                        </p>
                        <select
                            class="input-select scroll-custom"
                            id="prch_list"
                        ></select>
                    </div>

                    <div class="info-in">
                        <p>
                            <span class="r-value">*&nbsp;</span>
                            품목명
                        </p>
                        <input
                            type="text"
                            id="name"
                            placeholder="품목명을 입력해주세요."
                        />
                    </div>

                    <div class="info-in">
                        <p>품목코드</p>
                        <input
                            type="text"
                            id="item_code"
                            placeholder="품목코드를 입력해주세요."
                        />
                    </div>

                    <div class="info-in">
                        <p>단가</p>
                        <input
                            type="text"
                            class="number"
                            id="price"
                            placeholder="단가를 입력해주세요."
                        />
                    </div>

                    <div class="info-in">
                        <p>안전 재고 수량</p>
                        <input
                            type="text"
                            class="number"
                            id="sft_stc"
                            placeholder="안전 재고 수량을 입력해주세요."
                        />
                    </div>
                </div>

                <div class="btn-wrap" style="margin-top: 21px; right: 33px">
                    <div class="btn btn-del" onclick="deletion()">
                        <p>삭제</p>
                    </div>
                    <div class="btn btn-del" onclick="backPage()">
                        <p>뒤로</p>
                    </div>
                    <div class="btn btn-add" onclick="saveClick()">
                        <p id="saveBtn"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
