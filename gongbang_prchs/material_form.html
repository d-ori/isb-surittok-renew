        <link rel="stylesheet" href="../css/common.css" />

    <script>
        const id = params.get("id");
        const currentUrl = "material";
        const currentApi = "/material";

        let fileList_material = [];
        let price = 0;

        async function addFilesFromUrls(
            fileDto,
            targetList,
            renderFunc,
            columnName,
        ) {
            for (let i = 0; i < fileDto.length; i++) {
                const file = fileDto[i];
                if (file.upload_column === columnName) {
                    await addFileFromUrl(file.upload_url, targetList);
                }
            }
            renderFunc();
        }

        async function addFileFromUrl(url, targetList) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();

                // MIME 타입 기반으로 확장자 결정 (간단히 png/jpg만)
                const extension = blob.type === "image/png" ? "png" : "jpg";

                // File 객체 생성
                const file = new File([blob], `image_from_url.${extension}`, {
                    type: blob.type,
                });

                // 리스트에 추가
                if (targetList.length < 10) {
                    targetList.push(file);
                } else {
                    alert("최대 10개까지 가능합니다.");
                }
            } catch (error) {
                console.error("URL 이미지 변환 실패:", error);
            }
        }

        $(function () {
            getPrchList();

            if (id != null) {
                $(".current_qty").css("display", "none");
                getDetail();
                $("#saveBtn").html("수정");
            } else {
                $(".btn-del").css("display", "none");
                $("#saveBtn").html("등록");
            }
        });

        function getDetail() {
            Common.sendAxios(`${currentApi}/${id}`)
                .then(async (json) => {
                    const data = json.data;

                    const prch_id = data.prch_id;
                    const prch_name = data.prch_name;
                    const prcitm_id = data.prcitm_id;
                    const prcitm_name = data.prcitm_name;
                    const item_code = data.item_code;
                    const standard = data.standard;
                    const link = data.link;
                    const mnfct = data.mnfct;
                    const brand = data.brand;
                    const note = data.note.replaceAll("<br>", "\r\n");

                    $("#prch_id").val(prch_id);
                    $("#prcitm_id").val(prcitm_id);
                    $("#prch_name").val(prch_name);
                    $("#prcitm_name").val(prcitm_name);
                    $("#item_code").val(item_code);
                    $("#standard").val(standard);
                    $("#link").val(link);
                    $("#mnfct").val(mnfct);
                    $("#brand").val(brand);
                    $("#note").val(note);

                    const fileDto = json.searchVO;

                    await addFilesFromUrls(
                        fileDto,
                        fileList_material,
                        renderPreview_material,
                        "material",
                    );
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function saveClick() {
            const formData = new FormData();
            const prch_id = $("#prch_id").val();
            const prcitm_id = $("#prcitm_id").val();
            const prch_name = $("#prch_name").val();
            const prcitm_name = $("#prcitm_name").val();
            const standard = $("#standard").val();
            const link = $("#link").val();
            const mnfct = $("#mnfct").val();
            const brand = $("#brand").val();
            const note = $("#note")
                .val()
                .replace(/(?:\r\n|\r|\n)/g, "<br>");

            let method = "";

            if (Common.nullCheck(prch_id, "prch_id", "매입처")) return;

            formData.append("prch_id", prch_id);
            formData.append("prcitm_id", prcitm_id);
            formData.append("prch_name", prch_name);
            formData.append("prcitm_name", prcitm_name);
            formData.append("standard", standard);
            formData.append("link", link);
            formData.append("mnfct", mnfct);
            formData.append("brand", brand);
            formData.append("note", note);
            formData.append("price", price);

            if (fileList_material.length != 0) {
                fileList_material.forEach((file) => {
                    formData.append("fileList_material", file);
                });
            }

            if (id != null) {
                method = "/put";
                formData.append("material_id", id);
            } else {
                const current_qty = Number($("#current_qty").val()) || 0;
                formData.append("current_qty", current_qty);
            }

            Common.sendAxios(`${currentApi}${method}`, formData)
                .then(async (json) => {
                    if (json.code == 200) {
                        alert(json.msg);

                        if (id == null) {
                            const params = new URLSearchParams(
                                window.location.search,
                            );
                            params.delete("id");

                            const queryString = params.toString();
                            location.href = `${currentUrl}_list.html${queryString}`;
                        } else {
                            const queryString = window.location.search;
                            location.href = `${currentUrl}_detail.html${queryString}`;
                        }
                    } else if (json.code == 202) {
                        alert(json.msg);
                        $(`#${json.data}`).focus();
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function deletion() {
            if (
                confirm(
                    "정말 삭제하시겠습니까?\n한번 삭제한 데이터는 복구 할 수 없습니다.",
                ) == true
            ) {
                const formData = new FormData();
                formData.append("id_list", id);

                Common.sendAxios(`${currentApi}/delete`, formData)
                    .then(async (json) => {
                        alert(json.msg);
                        location.href = `${currentUrl}_list.html`;
                    })
                    .catch((err) => {
                        console.error("ERROR : ", err);
                    });
            }
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_detail.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_detail.html`;
            }
        }

        function getPrchList(page = 1) {
            Common.sendAxios(
                `/pitem?keyword=${decodeURI(
                    $("#search").val(),
                )}&page=${page}&sort=${decodeURI("b.name")}&cate=${$(
                    "#cate",
                ).val()}`,
            )
                .then(async (json) => {
                    if (json.code == 200) {
                        const list = json.data;
                        const searchVO = json.searchVO;

                        $("#list").empty();

                        if (list.length == 0) {
                            $("#list").append(
                                $(
                                    `<tr><td colspan='${$("#list").closest("table").find("colgroup col").length}'>검색 결과가 없습니다.</td></tr>`,
                                ),
                            );
                            return false;
                        }

                        Common.renderPaging(searchVO);

                        for (let i = 0; i < list.length; i++) {
                            const data = list[i];

                            const id = data.prcItm_id;
                            const prch_id = data.prch_id;
                            const item_code = data.item_code?.trim() || "-";

                            let tr = $(
                                `<tr id="tr${id}" onclick="selectPrch(${id}, ${prch_id},'${data.prch_name}','${data.name}', '${data.price}', '${item_code}')">`,
                            );

                            const listno =
                                searchVO.totalCnt -
                                ((searchVO.page - 1) * searchVO.recordSize + i);
                            const prch_name = data.prch_name;
                            const name = data.name;
                            const price = Common.numberWithCommas(data.price);

                            tr.append($($(`<td>${listno}</td>`)));
                            tr.append($(`<td>${prch_name}</td>`));
                            tr.append($(`<td>${name}</td>`));
                            tr.append($(`<td>${item_code}</td>`));
                            tr.append($(`<td>${price} 원</td>`));

                            $("#list").append(tr);
                        }
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function pageMove(pageIndex) {
            getPrchList(pageIndex);
        }

        function selectPrch(id, prch_id, prch_name, name, price_, item_code) {
            $("#prcitm_id").val(id);
            $("#prch_id").val(prch_id);
            $("#prcitm_name").val(name);
            $("#prch_name").val(prch_name);
            $("#item_code").val(item_code);
            price = price_;

            popup_close();
        }

        // 고객정보관리 팝업 열기
        function popup() {
            $(".background").css({ "z-index": "1000000" });
            $(".show-use").css({ "z-index": "100" });
            document.querySelector(".background").className =
                "background show-use";
        }

        // 고객정보관리 팝업 닫기
        function popup_close() {
            $(".background").css({ "z-index": "-1" });
            document.querySelector(".background").className = "background";
        }
    </script>

    <body>

        <script>
            function readURL_material(input) {
                const files = Array.from(input.files);

                // 새로운 파일들을 fileList에 추가
                files.forEach((file) => {
                    if (fileList_material.length < 10) {
                        fileList_material.push(file);
                    }
                });

                // 미리보기 UI를 fileList 순서대로 렌더링
                renderPreview_material();
            }

            async function renderPreview_material() {
                const previewContainer =
                    document.getElementById("preview_material");
                previewContainer.innerHTML = ""; // 기존 UI 초기화

                // fileList의 순서대로 미리보기 UI를 그린다
                for (let i = 0; i < fileList_material.length; i++) {
                    const file = fileList_material[i];

                    // FileReader를 사용해 이미지를 읽고 미리보기 UI에 추가
                    const reader = new FileReader();
                    await new Promise((resolve) => {
                        reader.onload = function (e) {
                            const li = document.createElement("li");
                            li.setAttribute("draggable", "true");
                            li.classList.add("image-item");

                            // 각 div에 고유한 index 부여 (data-index 속성 활용)
                            li.setAttribute("data-index", i);

                            const img = document.createElement("img");
                            img.src = e.target.result;

                            const btn = document.createElement("button");
                            btn.innerText = "X";
                            btn.classList.add("delete-btn");
                            btn.onclick = function () {
                                fileList_material.splice(i, 1); // fileList에서 해당 파일 삭제
                                renderPreview_material(); // 미리보기 UI 다시 렌더링
                            };

                            li.appendChild(img);
                            li.appendChild(btn);
                            previewContainer.appendChild(li);

                            resolve(); // 파일 읽기 완료 후 resolve 호출
                        };

                        reader.readAsDataURL(file); // 파일을 읽어서 비동기적으로 처리
                    });
                }

                // 이제 updateSortable 호출
                updateSortable_material();
            }

            function imgClear_material() {
                fileList_material = [];
                renderPreview_material();
            }

            function updateSortable_material() {
                $("#preview_material")
                    .sortable({
                        update: function () {
                            let newOrder = [];

                            // 새로운 순서대로 fileList 업데이트
                            $("#preview_material .image-item").each(
                                function () {
                                    let index = $(this).attr("data-index");
                                    // 새로운 순서대로 fileList를 업데이트
                                    newOrder.push(fileList_material[index]);
                                },
                            );

                            // 새로운 순서대로 fileList를 갱신
                            fileList_material = [...newOrder];

                            // 순서가 변경된 후 미리보기 UI 업데이트
                            setTimeout(function () {
                                renderPreview_material(); // 딜레이 후 순서가 제대로 반영되도록 미리보기 UI 다시 렌더링
                            }, 200); // 200ms 정도 기다린 후 업데이트
                        },
                    })
                    .disableSelection();
            }
        </script>

        <div
            id="imgModal"
            style="
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                justify-content: center;
                align-items: center;
            "
        >
            <img id="modalImg" src="" style="max-width: 90%; max-height: 90%" />
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const lists = document.querySelectorAll(".img-list"); // 모든 img-list 선택
                if (!lists.length) return;

                const modal = document.getElementById("imgModal");
                const modalImg = document.getElementById("modalImg");

                lists.forEach((list) => {
                    list.addEventListener("click", (e) => {
                        if (e.target.tagName === "IMG") {
                            modalImg.src = e.target.src;
                            modal.style.display = "flex";
                        }
                    });
                });

                modal.addEventListener("click", () => {
                    modal.style.display = "none";
                    modalImg.src = "";
                });
            });
        </script>
