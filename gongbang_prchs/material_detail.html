<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>A/S 이력관리시스템</title>
        <link rel="shortcut icon" href="../img/ico_shortIcon.png" />
        <script
            src="https://code.jquery.com/jquery-3.6.1.min.js"
            integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ="
            crossorigin="anonymous"
        ></script>
        <script src="../js/axios.min.js"></script>
        <script type="text/javascript" src="../js/common.js?ver=1"></script>
        <link rel="stylesheet" href="../css/common.css" />
        <link rel="stylesheet" href="../css/style.css" />
    </head>

    <script>
        const id = params.get("id");
        const currentUrl = "material";
        const currentApi = "/material";

        $(function () {
            getDetail();
        });

        function getDetail() {
            Common.sendAxios(`${currentApi}/${id}`)
                .then(async (json) => {
                    const data = json.data;

                    const prch_name = data.prch_name;
                    const prcitm_name = data.prcitm_name;
                    const item_code = data.item_code?.trim() || "-";
                    const standard = data.standard;
                    const link = data.link;
                    const mnfct = data.mnfct;
                    const brand = data.brand;
                    const note = data.note.replaceAll("<br>", "\r\n");

                    $("#prch_name").val(prch_name);
                    $("#prcitm_name").val(prcitm_name);
                    $("#item_code").val(item_code);
                    $("#standard").val(standard);
                    $("#link").val(link);
                    $("#mnfct").val(mnfct);
                    $("#brand").val(brand);
                    $("#note").val(note);

                    const fileDto = json.searchVO;

                    for (let i = 0; i < fileDto.length; i++) {
                        const file = fileDto[i];

                        if (file.upload_column == "material") {
                            $("#preview_material").append(
                                `<li><img src="${file.upload_url}"></li>`
                            );
                        }
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function modify() {
            const queryString = window.location.search;
            location.href = `${currentUrl}_form.html${queryString}`;
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            params.delete("id");

            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_list.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_list.html`;
            }
        }

        function getPrchList(page = 1) {
            Common.sendAxios(
                `/pitem?keyword=${decodeURI(
                    $("#search").val()
                )}&page=${page}&sort=${decodeURI("b.name")}&cate=${$(
                    "#cate"
                ).val()}`
            )
                .then(async (json) => {
                    if (json.code == 200) {
                        const list = json.data;
                        const searchVO = json.searchVO;

                        $("#list").empty();

                        if (list.length == 0) {
                            $("#list").append(
                                $(
                                    "<tr><td colspan='4'>검색 결과가 없습니다.</td></tr>"
                                )
                            );
                            return false;
                        }

                        Common.renderPaging(searchVO);

                        for (let i = 0; i < list.length; i++) {
                            const data = list[i];
                            const id = data.prcItm_id;
                            const prch_id = data.prch_id;
                            let tr = $(
                                `<tr id="tr${id}" onclick="selectPrch(${id}, ${prch_id},'${data.prch_name}','${data.name}')">`
                            );

                            const listno =
                                searchVO.totalCnt -
                                ((searchVO.page - 1) * searchVO.recordSize + i);
                            const prch_name = data.prch_name;
                            const name = data.name;
                            const price = Common.numberWithCommas(data.price);

                            tr.append($($(`<td>${listno}</td>`)));
                            tr.append($(`<td>${prch_name}</td>`));
                            tr.append($(`<td>${name}</td>`));
                            tr.append($(`<td>${price} 원</td>`));

                            $("#list").append(tr);
                        }
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function pageMove(pageIndex) {
            getPrchList(pageIndex);
        }

        function selectPrch(id, prch_id, prch_name, name) {
            $("#prcitm_id").val(id);
            $("#prch_id").val(prch_id);
            $("#prcitm_name").val(name);
            $("#prch_name").val(prch_name);

            popup_close();
        }

        // 고객정보관리 팝업 열기
        function popup() {
            getPrchList();

            $(".background").css({ "z-index": "1000000" });
            $(".show-use").css({ "z-index": "100" });
            document.querySelector(".background").className =
                "background show-use";
        }

        // 고객정보관리 팝업 닫기
        function popup_close() {
            $(".background").css({ "z-index": "-1" });
            document.querySelector(".background").className = "background";
        }
    </script>

    <body>
        <div class="top"></div>
        <div class="main">
            <div class="menu"></div>
            <div class="contents contents-add">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>자재 관리</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">HOME > 매입처 관리 > 자재 관리</p>
                    </div>
                </div>
                <div class="contents-in scroll-custom">
                    <div class="info-in info-in-modify-info">
                        <p>매입처명</p>
                        <input type="text" id="prch_name" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>품목명</p>
                        <input type="text" id="prcitm_name" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>품목코드</p>
                        <input type="text" id="item_code" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>규격</p>
                        <input type="text" id="standard" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>링크</p>
                        <input type="text" id="link" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>제조사</p>
                        <input type="text" id="mnfct" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>브랜드</p>
                        <input type="text" id="brand" readonly />
                    </div>

                    <div class="info-in info-file">
                        <div class="info-file-in">
                            <p>자재 이미지</p>

                            <div>
                                <div
                                    class="info-file-inner"
                                    style="height: 122px"
                                >
                                    <div class="img-list scroll-custom">
                                        <ul
                                            class="image-preview"
                                            id="preview_material"
                                        ></ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="info-in info-in-rm info-in-modify-info">
                        <p>비고</p>
                        <textarea
                            class="scroll-custom"
                            id="note"
                            readonly
                        ></textarea>
                    </div>
                </div>

                <div class="btn-wrap" style="margin-top: 21px; right: 33px">
                    <div class="btn btn-del" onclick="backPage()">
                        <p>뒤로</p>
                    </div>

                    <div class="btn btn-add" onclick="modify()">
                        <p>수정</p>
                    </div>
                </div>
            </div>
        </div>
        <div
            id="imgModal"
            style="
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                justify-content: center;
                align-items: center;
            "
        >
            <img id="modalImg" src="" style="max-width: 90%; max-height: 90%" />
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const lists = document.querySelectorAll(".img-list"); // 모든 img-list 선택
                if (!lists.length) return;

                const modal = document.getElementById("imgModal");
                const modalImg = document.getElementById("modalImg");

                lists.forEach((list) => {
                    list.addEventListener("click", (e) => {
                        if (e.target.tagName === "IMG") {
                            modalImg.src = e.target.src;
                            modal.style.display = "flex";
                        }
                    });
                });

                modal.addEventListener("click", () => {
                    modal.style.display = "none";
                    modalImg.src = "";
                });
            });
        </script>
    </body>
</html>
