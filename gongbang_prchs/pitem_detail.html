<!doctype html>
<html lang="ko">
    <head>
        <script src="../js/head-common.js?ver=1"></script>
</head>

    <script>
        const id = params.get("id");
        const currentUrl = "pitem";
        const currentApi = "/pitem";

        $(function () {
            getDetail();
        });

        function getDetail() {
            Common.sendAxios(`${currentApi}/${id}`)
                .then(async (json) => {
                    const data = json.data;

                    const name = data.name?.trim() || "-";
                    const price = Common.numberWithCommas(data.price);
                    const prch_name = data.prch_name;
                    const sft_stc = Common.numberWithCommas(data.sft_stc);
                    const item_code = data.item_code?.trim() || "-";

                    $("#name").val(name);
                    $("#price").val(price + " 원");
                    $("#prch_name").val(prch_name);
                    $("#sft_stc").val(sft_stc + " 개");
                    $("#item_code").val(item_code);
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function modify() {
            const queryString = window.location.search;
            location.href = `${currentUrl}_form.html${queryString}`;
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            params.delete("id");

            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_list.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_list.html`;
            }
        }
    </script>

    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div class="contents contents-add">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>매입 품목 관리</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">HOME > 매입처 관리 > 매입 품목 관리</p>
                    </div>
                </div>
                <div class="contents-in scroll-custom" style="height: 295px">
                    <div class="info-in info-in-modify-info">
                        <p>매입처</p>
                        <input type="text" id="prch_name" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>품목명</p>
                        <input
                            type="text"
                            id="name"
                            placeholder="품목명을 입력해주세요."
                            readonly
                        />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>품목명</p>
                        <input
                            type="text"
                            id="item_code"
                            placeholder="품목코드를 입력해주세요."
                            readonly
                        />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>단가</p>
                        <input type="text" id="price" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>안전 재고 수량</p>
                        <input type="text" id="sft_stc" readonly />
                    </div>
                </div>

                <div class="btn-wrap" style="margin-top: 21px; right: 33px">
                    <div class="btn btn-del" onclick="backPage()">
                        <p>뒤로</p>
                    </div>

                    <div class="btn btn-add" onclick="modify()">
                        <p>수정</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
