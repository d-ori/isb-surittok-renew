<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>A/S 이력관리시스템</title>
        <link rel="shortcut icon" href="../img/ico_shortIcon.png" />
        <script
            src="https://code.jquery.com/jquery-3.6.1.min.js"
            integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ="
            crossorigin="anonymous"
        ></script>
        <script src="../js/axios.min.js"></script>
        <script src="../js/app-shell.js?ver=1"></script>
        <script type="text/javascript" src="../js/common.js?ver=1"></script>
        <link rel="stylesheet" href="../css/modern.css" />
        <link rel="stylesheet" href="../css/modern-dashboard.css" />
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
        <link rel="stylesheet" href="../css/common.css" />
        <link rel="stylesheet" href="../css/legacy-forms-lists.css" />
    </head>

    <script>
        const id = params.get("id");
        const currentUrl = "item";
        const currentApi = "/item";

        $(function () {
            getDetail();
        });

        function getDetail() {
            Common.sendAjax(`${currentApi}/${id}`, "", "GET", function (json) {
                try {
                    const data = json.data;

                    const name = data.name;
                    const standard = data.standard;
                    const unit = data.unit;
                    const qntty = data.qntty;
                    const note = data.note.replaceAll("<br>", "\r\n");

                    $("#name").val(name);
                    $("#standard").val(standard);
                    $("#unit").val(unit);
                    $("#qntty").val(qntty);
                    $("#note").val(note);
                } catch (Excpetion) {
                    console.log("스크립트 에러 " + Excpetion);
                }
            });
        }

        function modify() {
            const queryString = window.location.search;
            location.href = `${currentUrl}_form.html${queryString}`;
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            params.delete("id");

            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_list.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_list.html`;
            }
        }
    </script>

    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div class="contents contents-add">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>품목 기준 정보</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">HOME > 품목정보 > 품목 기준 정보</p>
                    </div>
                </div>
                <div class="contents-in scroll-custom" style="height: 544px">
                    <div class="info-in info-in-modify-info">
                        <p>제품명</p>
                        <input type="text" id="name" readonly />
                    </div>
                    <div class="info-in info-in-modify-info">
                        <p>규격</p>
                        <input type="text" id="standard" readonly />
                    </div>
                    <div class="info-in info-in-modify-info">
                        <p>단위</p>
                        <input type="text" id="unit" readonly />
                    </div>
                    <div class="info-in info-in-modify-info">
                        <p>수량</p>
                        <input type="text" id="qntty" readonly />
                    </div>
                    <div class="info-in info-in-rm info-in-modify-info">
                        <p>비고</p>
                        <textarea
                            class="scroll-custom"
                            id="note"
                            readonly
                        ></textarea>
                    </div>
                </div>

                <div class="btn-wrap" style="margin-top: 21px; right: 33px">
                    <div class="btn btn-del" onclick="backPage()">
                        <p>뒤로</p>
                    </div>

                    <div class="btn btn-add" onclick="modify()">
                        <p>수정</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
