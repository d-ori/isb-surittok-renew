    <script>
        const id = params.get("id");
        const currentUrl = "process";
        const currentApi = "/process";

        $(function () {
            // getItem();

            if (id != null) {
                getDetail();
            }
        });

        let fileList_startAS = [];
        let fileList_endAS = [];

        async function addFilesFromUrls(
            fileDto,
            targetList,
            renderFunc,
            columnName,
        ) {
            for (let i = 0; i < fileDto.length; i++) {
                const file = fileDto[i];
                if (file.upload_column === columnName) {
                    await addFileFromUrl(file.upload_url, targetList);
                }
            }
            renderFunc();
        }

        async function addFileFromUrl(url, targetList) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();

                // MIME 타입 기반으로 확장자 결정 (간단히 png/jpg만)
                const extension = blob.type === "image/png" ? "png" : "jpg";

                // File 객체 생성
                const file = new File([blob], `image_from_url.${extension}`, {
                    type: blob.type,
                });

                // 리스트에 추가
                if (targetList.length < 10) {
                    targetList.push(file);
                } else {
                    alert("최대 10개까지 가능합니다.");
                }
            } catch (error) {
                console.error("URL 이미지 변환 실패:", error);
            }
        }

        async function getDetail() {
            Common.sendAxios(`${currentApi}/${id}`)
                .then(async (json) => {
                    const data = json.data;

                    const cus_id = data.cus_id;
                    const cus_name = data.cus_name;
                    const cus_name_rpr = data.cus_name_rpr;
                    const citem_id = data.citem_id;
                    const item_name = data.item_name;
                    const addr1 = data.addr1;
                    const addr2 = data.addr2;
                    const addr3 = data.addr3;
                    const phone = data.phone;
                    const symptom_cus = (data.symptom_cus || "").replaceAll(
                        "<br>",
                        "\r\n",
                    );
                    const as_cmpn_id = data.as_cmpn_id;
                    const as_cmpn_name = data.as_cmpn_name || data.cmpn_name;
                    const repair_id = data.repair_id;
                    const repair_name = data.repair_name;

                    $("#as_cmpn_id").val(as_cmpn_id);
                    $("#as_cmpn_name").val(as_cmpn_name);
                    $("#repair_id").val(repair_id);
                    $("#repair_name").val(repair_name);

                    $("#cus_id").val(cus_id);
                    $("#cus_name").val(cus_name + " / " + cus_name_rpr);
                    $("#citem_id").val(citem_id);
                    $("#item_name").val(item_name);
                    $("#addr1").val(addr1);
                    $("#addr2").val(addr2);
                    $("#zipcode").val(addr3);
                    $("#phone").val(phone);
                    $("#symptom_cus").val(symptom_cus);

                    const symptom = (data.symptom || "").replaceAll(
                        "<br>",
                        "\r\n",
                    );
                    const note = (data.note || "").replaceAll("<br>", "\r\n");

                    $("#symptom").val(symptom);
                    $("#note").val(note);

                    const fileDto = json.searchVO;

                    for (let i = 0; i < fileDto.length; i++) {
                        const file = fileDto[i];

                        if (file.upload_column == "startAS") {
                            $("#preview_startAS").append(
                                `<li><img src="${file.upload_url}"></li>`,
                            );
                        }
                    }

                    await addFilesFromUrls(
                        fileDto,
                        fileList_endAS,
                        renderPreview_endAS,
                        "endAS",
                    );
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function saveClick() {
            const formData = new FormData();
            const note = ($("#note").val() || "")?.replaceAll("<br>", "\r\n");

            let method = "";
            formData.append("note", note);

            if (fileList_endAS.length != 0) {
                fileList_endAS.forEach((file) => {
                    formData.append("fileList_endAS", file);
                });
            }

            if (id != null) {
                method = "/putEnd";
                formData.append("as_id", id);
            }

            Common.sendAxios(`${currentApi}${method}`, formData)
                .then(async (json) => {
                    if (json.code == 200) {
                        alert(json.msg);
                        location.href = `sales_form.html?id=${id}`;
                    } else if (json.code == 202) {
                        alert(json.msg);
                        $(`#${json.data}`).focus();
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function deletion() {
            if (
                confirm(
                    "정말 삭제하시겠습니까?\n한번 삭제한 데이터는 복구 할 수 없습니다.",
                ) == true
            ) {
                const formData = new FormData();
                formData.append("id_list", id);
                formData.append("status", "8");

                Common.sendAxios(`/as/delete`, formData)
                    .then(async (json) => {
                        alert(json.msg);
                        location.href = `${currentUrl}_list.html`;
                    })
                    .catch((err) => {
                        console.error("ERROR : ", err);
                    });
            }
        }

        function cancel() {
            if (confirm("작업을 취소하시겠습니까?") == true) {
                const formData = new FormData();
                formData.append("id_list", id);

                Common.sendAxios(`${currentApi}/cancel`, formData)
                    .then(async (json) => {
                        alert(json.msg);
                        location.href = `${currentUrl}_list.html`;
                    })
                    .catch((err) => {
                        console.error("ERROR : ", err);
                    });
            }
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            params.delete("id");

            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_list.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_list.html`;
            }
        }

        function modifyClick() {
            const params = new URLSearchParams(window.location.search);
            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_form.html?${queryString}`;
            }
        }

        // 고객정보관리 팝업 열기
        function popup() {
            $(".background").css({ "z-index": "1000000" });
            $(".show-use").css({ "z-index": "100" });
            document.querySelector(".background").className =
                "background show-use";
        }

        // 고객정보관리 팝업 닫기
        function popup_close() {
            $(".background").css({ "z-index": "-1" });
            document.querySelector(".background").className = "background";
        }

        function cal() {
            let price = Number($("#outbnd_price").val()?.replaceAll(",", ""));
            let vat_price = Number($("#vat_price").val()?.replaceAll(",", ""));

            if ($("#outbnd_price").val() == "") {
                alert("품목를 먼저 선택해주세요.");
                popup();
                return;
            }

            $("#amount").val(
                Common.numberWithCommas(
                    (price + vat_price) * $("#outbnd_qty").val(),
                ),
            );
        }
    </script>

        <script>
            function readURL_startAS(input) {
                const files = Array.from(input.files);

                // 새로운 파일들을 fileList에 추가
                files.forEach((file) => {
                    if (fileList_startAS.length < 10) {
                        fileList_startAS.push(file);
                    }
                });

                // 미리보기 UI를 fileList 순서대로 렌더링
                renderPreview_startAS();
            }

            async function renderPreview_startAS() {
                const previewContainer =
                    document.getElementById("preview_startAS");
                previewContainer.innerHTML = ""; // 기존 UI 초기화

                // fileList의 순서대로 미리보기 UI를 그린다
                for (let i = 0; i < fileList_startAS.length; i++) {
                    const file = fileList_startAS[i];

                    // FileReader를 사용해 이미지를 읽고 미리보기 UI에 추가
                    const reader = new FileReader();
                    await new Promise((resolve) => {
                        reader.onload = function (e) {
                            const li = document.createElement("li");
                            li.setAttribute("draggable", "true");
                            li.classList.add("image-item");

                            // 각 div에 고유한 index 부여 (data-index 속성 활용)
                            li.setAttribute("data-index", i);

                            const img = document.createElement("img");
                            img.src = e.target.result;

                            const btn = document.createElement("button");
                            btn.innerText = "X";
                            btn.classList.add("delete-btn");
                            btn.onclick = function () {
                                fileList_startAS.splice(i, 1); // fileList에서 해당 파일 삭제
                                renderPreview_startAS(); // 미리보기 UI 다시 렌더링
                            };

                            li.appendChild(img);
                            li.appendChild(btn);
                            previewContainer.appendChild(li);

                            resolve(); // 파일 읽기 완료 후 resolve 호출
                        };

                        reader.readAsDataURL(file); // 파일을 읽어서 비동기적으로 처리
                    });
                }

                // 이제 updateSortable 호출
                updateSortable_startAS();
            }

            function imgClear_startAS() {
                fileList_startAS = [];
                renderPreview_startAS();
            }

            function updateSortable_startAS() {
                $("#preview_startAS")
                    .sortable({
                        update: function () {
                            let newOrder = [];

                            // 새로운 순서대로 fileList 업데이트
                            $("#preview_startAS .image-item").each(function () {
                                let index = $(this).attr("data-index");
                                // 새로운 순서대로 fileList를 업데이트
                                newOrder.push(fileList_startAS[index]);
                            });

                            // 새로운 순서대로 fileList를 갱신
                            fileList_startAS = [...newOrder];

                            // 순서가 변경된 후 미리보기 UI 업데이트
                            setTimeout(function () {
                                renderPreview_startAS(); // 딜레이 후 순서가 제대로 반영되도록 미리보기 UI 다시 렌더링
                            }, 200); // 200ms 정도 기다린 후 업데이트
                        },
                    })
                    .disableSelection();
            }

            function readURL_endAS(input) {
                const files = Array.from(input.files);

                // 새로운 파일들을 fileList에 추가
                files.forEach((file) => {
                    if (fileList_endAS.length < 10) {
                        fileList_endAS.push(file);
                    }
                });

                // 미리보기 UI를 fileList 순서대로 렌더링
                renderPreview_endAS();
            }

            async function renderPreview_endAS() {
                const previewContainer =
                    document.getElementById("preview_endAS");
                previewContainer.innerHTML = ""; // 기존 UI 초기화

                // fileList의 순서대로 미리보기 UI를 그린다
                for (let i = 0; i < fileList_endAS.length; i++) {
                    const file = fileList_endAS[i];

                    // FileReader를 사용해 이미지를 읽고 미리보기 UI에 추가
                    const reader = new FileReader();
                    await new Promise((resolve) => {
                        reader.onload = function (e) {
                            const li = document.createElement("li");
                            li.setAttribute("draggable", "true");
                            li.classList.add("image-item");

                            // 각 div에 고유한 index 부여 (data-index 속성 활용)
                            li.setAttribute("data-index", i);

                            const img = document.createElement("img");
                            img.src = e.target.result;

                            const btn = document.createElement("button");
                            btn.innerText = "X";
                            btn.classList.add("delete-btn");
                            btn.onclick = function () {
                                fileList_endAS.splice(i, 1); // fileList에서 해당 파일 삭제
                                renderPreview_endAS(); // 미리보기 UI 다시 렌더링
                            };

                            li.appendChild(img);
                            li.appendChild(btn);
                            previewContainer.appendChild(li);

                            resolve(); // 파일 읽기 완료 후 resolve 호출
                        };

                        reader.readAsDataURL(file); // 파일을 읽어서 비동기적으로 처리
                    });
                }

                // 이제 updateSortable 호출
                updateSortable_endAS();
            }

            function imgClear_endAS() {
                fileList_endAS = [];
                renderPreview_endAS();
            }

            function updateSortable_endAS() {
                $("#preview_endAS")
                    .sortable({
                        update: function () {
                            let newOrder = [];

                            // 새로운 순서대로 fileList 업데이트
                            $("#preview_endAS .image-item").each(function () {
                                let index = $(this).attr("data-index");
                                // 새로운 순서대로 fileList를 업데이트
                                newOrder.push(fileList_endAS[index]);
                            });

                            // 새로운 순서대로 fileList를 갱신
                            fileList_endAS = [...newOrder];

                            // 순서가 변경된 후 미리보기 UI 업데이트
                            setTimeout(function () {
                                renderPreview_endAS(); // 딜레이 후 순서가 제대로 반영되도록 미리보기 UI 다시 렌더링
                            }, 200); // 200ms 정도 기다린 후 업데이트
                        },
                    })
                    .disableSelection();
            }
        </script>

        <div
            id="imgModal"
            style="
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                justify-content: center;
                align-items: center;
            "
        >
            <img id="modalImg" src="" style="max-width: 90%; max-height: 90%" />
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const lists = document.querySelectorAll(".img-list"); // 모든 img-list 선택
                if (!lists.length) return;

                const modal = document.getElementById("imgModal");
                const modalImg = document.getElementById("modalImg");

                lists.forEach((list) => {
                    list.addEventListener("click", (e) => {
                        if (e.target.tagName === "IMG") {
                            modalImg.src = e.target.src;
                            modal.style.display = "flex";
                        }
                    });
                });

                modal.addEventListener("click", () => {
                    modal.style.display = "none";
                    modalImg.src = "";
                });
            });
        </script>
