<!doctype html>
<html lang="ko">
    <head>
        <script src="../js/head-common.js?ver=1"></script>
<!-- 카카오맵 연동 -->
        <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    </head>
    <script>
        const id = params.get("id");
        const currentUrl = "assignment";
        const currentApi = "/assignment";
        let info = JSON.parse(localStorage.getItem("info"));
        let cmpn_id = "";
        const current_cmpn_id = info?.cmpn_id;

        let data_status = "";

        function kakaopost() {
            new daum.Postcode({
                oncomplete: function (data) {
                    document.querySelector("#zipcode").value = data.zonecode;
                    document.querySelector("#addr1").value = data.address + " ";
                    document.querySelector("#addr2").value = "";
                },
            }).open();
        }

        function formatTime(timeStr) {
            // "HH:mm" 형식 들어온다고 가정
            let [hour, minute] = timeStr.split(":");
            hour = String(Number(hour)); // 숫자로 바꿨다가 다시 문자로 → 앞의 0 제거됨
            return `${hour}:${minute}`;
        }

        $(function () {
            getPartnerList();

            if (id != null) {
                getDetail();
                $("#saveBtn").html("배정");
            }
        });

        function getDetail() {
            Common.sendAxios(`${currentApi}/${id}`)
                .then(async (json) => {
                    const data = json.data;

                    data_status = data.status;

                    if (data.status == "1") {
                        $("#saveBtn").html("배정");
                    } else if (data.status == "2") {
                        $("#cancelDiv").show();
                        $("#saveBtn").html("배정 수정");
                    }

                    const cus_id = data.cus_id;
                    const cus_name = data.cus_name;
                    const cus_name_rpr = data.cus_name_rpr;
                    const citem_id = data.citem_id;
                    const item_name = data.item_name;
                    const addr1 = data.addr1;
                    const addr2 = data.addr2;
                    const addr3 = data.addr3;
                    const phone = Common.formatPhoneNumber(data.phone);
                    const symptom_cus = data.symptom_cus.replaceAll(
                        "<br>",
                        "\r\n",
                    );
                    const as_cmpn_id = data.as_cmpn_id;
                    const as_cmpn_name = data.as_cmpn_name || data.cmpn_name;
                    is_cmpn(as_cmpn_id);
                    const repair_id = data.repair_id;
                    const repair_name = data.repair_name;

                    $("#as_cmpn_id").val(as_cmpn_id);
                    $("#as_cmpn_name").val(as_cmpn_name);
                    $("#repair_id").val(repair_id);
                    $("#repair_name").val(repair_name);

                    $("#cus_id").val(cus_id);
                    $("#cus_name").val(cus_name + " / " + cus_name_rpr);
                    $("#citem_id").val(citem_id);
                    $("#item_name").val(item_name);
                    $("#addr1").val(addr1);
                    $("#addr2").val(addr2);
                    $("#zipcode").val(addr3);
                    $("#phone").val(phone);
                    $("#symptom_cus").val(symptom_cus);
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function is_cmpn(a) {
            if (a == current_cmpn_id) {
                $("#repair_div").css("display", "");
            } else {
                $("#repair_div").css("display", "none");
            }
        }

        function saveClick() {
            const formData = new FormData();
            const as_cmpn_id = $("#as_cmpn_id").val();
            const isHidden = $("#repair_div").is(":hidden");

            if (!isHidden) {
                if (
                    Common.nullCheck(
                        $("#repair_name").val(),
                        "repair_name",
                        "A/S 기사",
                    )
                )
                    return;

                formData.append("repair_id", $("#repair_id").val());
                formData.append("repair_name", $("#repair_name").val());
            }

            let method = "";

            formData.append("as_cmpn_id", as_cmpn_id);

            if (id != null) {
                method = "/put";
                formData.append("as_id", id);
            }

            Common.sendAxios(`${currentApi}${method}`, formData)
                .then(async (json) => {
                    if (json.code == 200) {
                        alert(json.msg);

                        location.href = `process_form.html?id=${id}`;
                    } else if (json.code == 202) {
                        alert(json.msg);
                        $(`#${json.data}`).focus();
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function deletion() {
            if (
                confirm(
                    "정말 삭제하시겠습니까?\n한번 삭제한 데이터는 복구 할 수 없습니다.",
                ) == true
            ) {
                const formData = new FormData();
                formData.append("id_list", id);

                if (data_status == "1") {
                    formData.append("status", "6");
                } else if (data_status == "2") {
                    formData.append("status", "7");
                }

                Common.sendAxios(`/as/delete`, formData)
                    .then(async (json) => {
                        alert(json.msg);
                        location.href = `${currentUrl}_list.html`;
                    })
                    .catch((err) => {
                        console.error("ERROR : ", err);
                    });
            }
        }

        function cancel() {
            if (confirm("기사 배정을 취소하시겠습니까?") == true) {
                const formData = new FormData();
                formData.append("id_list", id);

                Common.sendAxios(`${currentApi}/cancel`, formData)
                    .then(async (json) => {
                        alert(json.msg);
                        location.href = `${currentUrl}_list.html`;
                    })
                    .catch((err) => {
                        console.error("ERROR : ", err);
                    });
            }
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            params.delete("id");

            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_list.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_list.html`;
            }
        }

        function getPartnerList(page = 1) {
            Common.sendAxios(
                `/partner?&keyword=${decodeURI(
                    $("#search").val(),
                )}&page=${page}&sort=${decodeURI("created_at DESC")}&cate=${$(
                    "#cate",
                ).val()}`,
            )
                .then(async (json) => {
                    if (json.code == 200) {
                        const list = json.data;
                        const searchVO = json.searchVO;

                        $("#list").empty();

                        if (list.length == 0) {
                            $("#list").append(
                                $(
                                    `<tr><td colspan='${$("#list").closest("table").find("colgroup col").length}'>검색 결과가 없습니다.</td></tr>`,
                                ),
                            );
                            return false;
                        }

                        Common.renderPaging(searchVO);

                        for (let i = 0; i < list.length; i++) {
                            const data = list[i];
                            const id = data.cmpn_id;

                            let tr = $(
                                `<tr id="tr${id}" onclick="selectPartner(${id},'${data.name}')">`,
                            );

                            const listno =
                                searchVO.totalCnt -
                                ((searchVO.page - 1) * searchVO.recordSize + i);
                            const name = data.name;
                            const tel = data.tel?.trim() || "-";
                            const addr1 = data.addr1 || "";
                            const addr2 = data.addr2 || "";
                            const addr = (addr1 + " " + addr2).trim() || "-";

                            tr.append($($(`<td>${listno}</td>`)));
                            tr.append($(`<td>${name}</td>`));
                            tr.append($(`<td>${tel}</td>`));
                            tr.append($(`<td>${addr}</td>`));

                            $("#list").append(tr);
                        }
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function pageMove(pageIndex) {
            getPartnerList(pageIndex);
        }

        function selectPartner(id, name) {
            if (id != $("#as_cmpn_id").val()) {
                $("#repair_id").val("");
                $("#repair_name").val("");
            }

            $("#as_cmpn_id").val(id);
            $("#as_cmpn_name").val(name);

            is_cmpn(id);

            popup_close();
        }

        // A/S 업체 팝업 열기
        function popup() {
            $(".background").css({ "z-index": "1000000" });
            $(".show-use").css({ "z-index": "100" });
            document.querySelector(".background").className =
                "background show-use";
        }

        // A/S 업체 팝업 닫기
        function popup_close() {
            $(".background").css({ "z-index": "-1" });
            document.querySelector(".background").className = "background";
        }

        // A/S 기사 팝업
        function popup_repair() {
            const as_cmpn_id = $("#as_cmpn_id").val();

            if (
                as_cmpn_id == "" ||
                as_cmpn_id == null ||
                as_cmpn_id == undefined
            ) {
                alert("업체 선택 후 기사를 선택해 주세요");
                popup();
                return false;
            }

            Common.sendAxios(`/repair/cmpn?cmpn_id=${as_cmpn_id}`)
                .then(async (json) => {
                    if (json.code == 200) {
                        const list = json.data;
                        const searchVO = json.searchVO;

                        $("#listItem").empty();

                        if (list.length == 0) {
                            $("#listItem").append(
                                $(
                                    "<tr><td colspan='3'>검색 결과가 없습니다.</td></tr>",
                                ),
                            );
                            return false;
                        }

                        for (let i = 0; i < list.length; i++) {
                            const data = list[i];
                            const id = data.account_id;

                            let tr = $(
                                `<tr id="tr${id}" onclick="selectItem(${id},'${data.name}')">`,
                            );

                            const listno =
                                searchVO.totalCnt -
                                ((searchVO.page - 1) * searchVO.recordSize + i);
                            const name = data.name;
                            const phone = data.phone;

                            tr.append($($(`<td>${listno}</td>`)));
                            tr.append($(`<td>${name}</td>`));
                            tr.append($(`<td>${phone}</td>`));

                            $("#listItem").append(tr);
                        }
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });

            $(".background-item").css({ "z-index": "1000000" });
            $(".show-use-item").css({ "z-index": "100" });
            document.querySelector(".background-item").className =
                "background-item show-use-item";
        }

        function popup_repair_close() {
            $(".background-item").css({ "z-index": "-1" });
            document.querySelector(".background-item").className =
                "background-item";
        }

        function selectItem(id, name) {
            $("#repair_id").val(id);
            $("#repair_name").val(name);

            popup_repair_close();
        }
    </script>
    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div class="contents contents-add">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>접수관리</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">HOME > A/S 관리 > 배정관리</p>
                    </div>
                </div>

                <div class="contents-in scroll-custom">
                    <div class="info-in">
                        <p class="as-p">
                            <span class="r-value">*&nbsp;</span>
                            A/S 업체
                        </p>
                        <input
                            type="text"
                            readonly
                            onclick="popup()"
                            style="cursor: pointer"
                            id="as_cmpn_name"
                        />
                        <input type="hidden" id="as_cmpn_id" />
                    </div>

                    <div class="info-in" id="repair_div" style="display: none">
                        <p class="as-p">
                            <span class="r-value">*&nbsp;</span>
                            A/S 기사
                        </p>
                        <input
                            type="text"
                            onclick="popup_repair()"
                            style="cursor: pointer"
                            id="repair_name"
                            readonly
                        />
                        <input type="hidden" id="repair_id" />
                    </div>

                    <div class="info-in info-in-line">
                        <img src="../img/ico_input_line.png" />
                        <p class="info-in-title">접수 내용</p>
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p class="as-p">접수처/수리처</p>
                        <input type="text" readonly id="cus_name" />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p class="as-p">제품명</p>
                        <input type="text" id="item_name" readonly />
                    </div>

                    <div class="info-in info-addr info-in-modify-info">
                        <p class="as-p">A/S 방문 주소</p>
                        <div class="addr-wrap">
                            <div class="addr-zipcode-wrap">
                                <input
                                    type="text"
                                    readonly
                                    id="zipcode"
                                    readonly
                                />
                            </div>
                            <input
                                type="text"
                                id="addr1"
                                class="addr-dtl"
                                style="cursor: text"
                                readonly
                            />
                            <input
                                type="text"
                                id="addr2"
                                class="addr-dtl"
                                readonly
                            />
                        </div>
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p class="as-p">연락처</p>
                        <input type="text" id="phone" maxlength="11" readonly />
                    </div>

                    <div
                        class="info-in info-in-t info-in-modify-info"
                        style="height: 76px"
                    >
                        <p class="as-p">고객 증상</p>
                        <textarea
                            class="scroll-custom"
                            style="height: 64px"
                            id="symptom_cus"
                            readonly
                        ></textarea>
                    </div>
                </div>

                <div class="btn-wrap" style="margin-top: 21px; right: 33px">
                    <div class="btn btn-del" id="delDiv" onclick="deletion()">
                        <p>삭제</p>
                    </div>
                    <div
                        class="btn btn-del"
                        id="cancelDiv"
                        style="display: none"
                        onclick="cancel()"
                    >
                        <p>배정 취소</p>
                    </div>
                    <div class="btn btn-del" onclick="backPage()">
                        <p>뒤로</p>
                    </div>
                    <div class="btn btn-add" onclick="saveClick()">
                        <p id="saveBtn"></p>
                    </div>
                </div>

                <!-- A/S 업체 팝업 -->
                <div class="background">
                    <div class="window">
                        <div class="popup popup-list-dtl" style="width: 749px">
                            <div class="popup-hd"><p>A/S 업체 목록</p></div>
                            <div class="popup-search">
                                <div class="popup-search-in">
                                    <select
                                        class="popup-search-select"
                                        id="cate"
                                    >
                                        <option value="">전체</option>
                                        <option value="name">업체명</option>
                                        <option value="owner">대표자명</option>
                                    </select>
                                    <div class="popup-search-in">
                                        <input
                                            type="text"
                                            placeholder="검색어를 입력해주세요."
                                            class="search-input"
                                            id="search"
                                            onkeypress="getPartnerList()"
                                        />
                                    </div>
                                    <img
                                        src="../img/ico_search_popup.png"
                                        class="ico-search-popup"
                                        onclick="getPartnerList()"
                                    />
                                </div>
                            </div>
                            <div class="popup-in">
                                <div class="contents-in popup-contents-in">
                                    <div class="list popup-list">
                                        <table>
                                            <colgroup>
                                                <col style="width: 100px" />
                                                <col style="width: 30%" />
                                                <col style="width: 20%" />
                                                <col style="width: 50%" />
                                            </colgroup>
                                            <tbody>
                                                <tr>
                                                    <th>NO</th>
                                                    <th>업체명</th>
                                                    <th>대표번호</th>
                                                    <th>주소</th>
                                                </tr>
                                            </tbody>

                                            <tbody id="list"></tbody>
                                        </table>
                                    </div>
                                    <div class="paging popup-paging">
                                        <div
                                            class="paging-inner popup-paging-inner"
                                            id="pagingArea"
                                        ></div>
                                    </div>
                                </div>
                                <div class="popup-close">
                                    <p onclick="popup_close()">닫기</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- A/S 기사 팝업 -->
                <div class="background-item">
                    <div class="window">
                        <div
                            class="popup popup-list-dtl"
                            style="
                                width: 749px;
                                height: 680px;
                                top: calc((100vh - 680px) / 2);
                            "
                        >
                            <div class="popup-hd"><p>A/S 기사 목록</p></div>
                            <div class="popup-in">
                                <div class="contents-in popup-contents-in">
                                    <div class="list popup-list">
                                        <table>
                                            <colgroup>
                                                <col style="width: 100px" />
                                                <col style="width: 100%" />
                                                <col style="width: 200px" />
                                            </colgroup>

                                            <tbody>
                                                <tr>
                                                    <th>NO</th>
                                                    <th>기사명</th>
                                                    <th>연락처</th>
                                                </tr>
                                            </tbody>

                                            <tbody id="listItem"></tbody>
                                        </table>
                                    </div>
                                </div>
                                <div class="popup-close">
                                    <p onclick="popup_repair_close()">닫기</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
