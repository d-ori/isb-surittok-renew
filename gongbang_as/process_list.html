<!doctype html>
<html lang="ko">
    <head>
        <script src="../js/head-common.js?ver=1"></script>
<!-- Sheet JS -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.14.3/xlsx.full.min.js"></script>
        <!--FileSaver savaAs 이용 -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.min.js"></script>
    </head>

    <script>
        let arr = [];
        const currentUrl = "process";
        const currentApi = "/process";
        const sort =
            params.get("sort") == undefined
                ? decodeURI("a.created_at DESC")
                : decodeURI(params.get("sort"));
        const page = params.get("page") || "1";
        const keyword = decodeURI(params.get("keyword")) || "";
        const cate = decodeURI(params.get("cate")) || "";
        const type = decodeURI(params.get("type")) || "";

        $(function () {
            if (params.get("page") == null) {
                location.href = `${currentUrl}_list.html?page=1&keyword=&sort=${sort}&cate=&type=`;
            } else {
                let [sortColumn, sortDir] = sort.split(" ");
                sortColumn = sortColumn.replace(".", "_");

                const arrowIcon =
                    sortDir === "DESC"
                        ? "ico_arrow_down.png"
                        : "ico_arrow_up.png";

                $(`#sort_${sortColumn}`).attr("src", `../img/${arrowIcon}`);

                getList();
            }
        });

        // sort
        function sortClick(select) {
            // 현재 sort 상태가 예: "name DESC" 또는 "name"
            const [currentColumn, currentDirection] = sort.split(" ");

            // 같은 컬럼 클릭 시 정렬 방향 토글, 다른 컬럼 클릭 시 DESC로 시작
            const newDirection =
                currentColumn === select
                    ? currentDirection === "DESC"
                        ? ""
                        : "DESC"
                    : "DESC";

            // 정렬 문자열 구성 (기본 오름차순이면 컬럼명만 넘김)
            const newSort = newDirection ? `${select} ${newDirection}` : select;

            location.href = `${currentUrl}_list.html?page=${page}&keyword=${keyword}&sort=${newSort}&cate=${cate}&type=${type}`;
        }

        // 리스트
        function getList() {
            $("#search").val(keyword);
            $("#cate").val(cate);
            $("#type").val(type);

            Common.sendAxios(
                `${currentApi}?keyword=${keyword}&page=${page}&sort=${sort}&cate=${$(
                    "#cate",
                ).val()}&type=${$("#type").val()}`,
            )
                .then(async (json) => {
                    if (json.code == 200) {
                        const list = json.data;
                        const searchVO = json.searchVO;

                        if (list.length == 0) {
                            $("#list").append(
                                $(
                                    `<tr><td colspan='${$("#list").closest("table").find("colgroup col").length}'>검색 결과가 없습니다.</td></tr>`,
                                ),
                            );
                            return false;
                        }

                        $("#list").empty();

                        Common.renderPaging(searchVO);

                        for (let i = 0; i < list.length; i++) {
                            const data = list[i];
                            const id = data.as_id;
                            const transfer = data.transfer;

                            let tr = $(
                                `<tr id="tr${id}" class="list_check" val="${id}" onclick="detail(event, ${id}, ${data.status})">`,
                            );

                            if (transfer === "Y") tr.addClass("as-orange-row");

                            const listno =
                                searchVO.totalCnt -
                                ((searchVO.page - 1) * searchVO.recordSize + i);
                            const created_at = data.created_at.slice(0, 16);
                            const work_start_at = data.work_start_at;
                            const cus_name = data.cus_name;
                            const item_name = data.item_name?.trim() || "-";
                            const phone = Common.formatPhoneNumber(data.phone);
                            const addr1 = data.addr1 || "";
                            const addr2 = data.addr2 || "";
                            const addr = (addr1 + " " + addr2).trim() || "-";
                            const repair_id = data.repair_id;
                            const repair_name = data.repair_name || "-";
                            const as_cmpn_name = data.as_cmpn_name || "-";
                            const status = data.status;

                            tr.append($($(`<td>${listno}</td>`)));

                            if (status == "1") {
                                tr.append($(`<td>${created_at}</td>`));
                                tr.append($(`<td>-</td>`));
                                tr.append(
                                    $(
                                        `<td class="as-status" style="color: #8EE1C6">미배정</td>`,
                                    ),
                                );
                            } else if (status == "2") {
                                tr.append($(`<td>${created_at}</td>`));
                                tr.append($(`<td>-</td>`));
                                tr.append(
                                    $(
                                        `<td class="as-status" style="color: #7C58FF">배정완료</td>`,
                                    ),
                                );
                            } else if (status == "3") {
                                tr.append($(`<td>${created_at}</td>`));
                                tr.append($(`<td>${work_start_at.slice(0, 16)}</td>`));
                                tr.append(
                                    $(
                                        `<td class="as-status" style="color: #FFA95D">작업중</td>`,
                                    ),
                                );
                            } else if (status == "4") {
                                tr.append($(`<td>${created_at}</td>`));
                                tr.append($(`<td>${work_start_at.slice(0, 16)}</td>`));
                                tr.append(
                                    $(
                                        `<td class="as-status" style="color: #4E8EED">작업완료</td>`,
                                    ),
                                );
                            }

                            const cus_name_rpr = data.cus_name_rpr;
                            tr.append(
                                $(`<td>${cus_name}<br>${cus_name_rpr}</td>`),
                            );
                            tr.append($(`<td>${item_name}</td>`));
                            tr.append($(`<td>${addr}</td>`));
                            tr.append($(`<td>${phone}</td>`));

                            const cls = transfer === "Y" ? "as-orange" : "";
                            tr.append(
                                `<td class="${cls}">${as_cmpn_name}</td>`,
                            );
                            tr.append(`<td class="${cls}">${repair_name}</td>`);

                            $("#list").append(tr);
                        }
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        // paging 이동
        function pageMove(pageIndex) {
            location.href = `${currentUrl}_list.html?page=${pageIndex}&keyword=${keyword}&sort=${sort}&cate=${cate}&type=${type}`;
        }

        // 체크박스
        function check() {
            $("input[name=_selected_all_]").on("change", function () {
                $("input[name=_selected_]").prop("checked", this.checked);
                if (this.checked) {
                    $("tr").addClass("selected-row");
                } else {
                    $("tr").removeClass("selected-row");
                }
            });

            $("input[name=_selected_]").on("change", function () {
                $(this).closest("tr").toggleClass("selected-row", this.checked);

                const allChecked =
                    $("input[name=_selected_]").length ===
                    $("input[name=_selected_]:checked").length;
                $("input[name=_selected_all_]").prop("checked", allChecked);
            });
        }

        // 선택 → 수정 → back, 선택해제
        function uncheck() {
            $(":checkbox:checked").prop("checked", false);
        }

        // search - Enter
        function enterkey() {
            if (window.event.keyCode == 13) {
                search();
            }
        }

        // 검색
        function search() {
            location.href = `${currentUrl}_list.html?page=1&keyword=${decodeURI(
                $("#search").val(),
            )}&sort=${sort}&cate=${$("#cate").val()}&type=${$("#type").val()}`;
        }

        // 선택 삭제
        function deletion() {
            let id_list = "";

            const selectedRows = document.querySelectorAll(
                ".list_check.selected-row",
            );

            for (let i = 0; i < selectedRows.length; i++) {
                if (i == selectedRows.length - 1) {
                    id_list += selectedRows[i].getAttribute("val");
                } else {
                    id_list += selectedRows[i].getAttribute("val") + ",";
                }
            }

            if (selectedRows.length > 0) {
                if (
                    confirm(
                        "정말 삭제하시겠습니까?\n한번 삭제한 데이터는 복구 할 수 없습니다.",
                    ) == true
                ) {
                    const formData = new FormData();
                    formData.append("id_list", id_list);

                    Common.sendAxios(`${currentApi}/delete`, formData)
                        .then(async (json) => {
                            alert(json.msg);
                            location.reload();
                        })
                        .catch((err) => {
                            console.error("ERROR : ", err);
                        });
                }
            } else {
                alert("데이터를 선택해주세요.");
            }
        }

        // 등록
        function add() {
            location.href = `${currentUrl}_form.html`;
        }

        // 상세
        function detail(e, id, status) {
            var targetId = $(e.target).attr("id") || "";

            if (targetId.includes("row")) {
                return;
            }

            const queryString = window.location.search;

            if (status == "1") {
                location.href = `assignment_form.html?id=${id}${queryString.replace(
                    "?",
                    "&",
                )}`;
            } else if (status == "2") {
                location.href = `process_form.html?id=${id}${queryString.replace(
                    "?",
                    "&",
                )}`;
            } else if (status == "3") {
                location.href = `process_end_form.html?id=${id}${queryString.replace(
                    "?",
                    "&",
                )}`;
            } else if (status == "4") {
                location.href = `sales_detail.html?id=${id}${queryString.replace(
                    "?",
                    "&",
                )}`;
            }
        }

        // 엑셀 다운로드
        function excel_download() {
            Common.sendAxios(
                `${currentApi}?keyword=${keyword}&page=${page}&sort=${sort}&cate=${cate}&type=${type}&usePageNavy=false`,
            )
                .then(async (json) => {
                    const list = json.data;

                    if (list.length == 0) {
                        alert("조회된 결과가 없습니다.");
                        return;
                    }

                    const excelData = list.map((data) => ({
                        접수시간: data.created_at,
                        "작업 시작일": data.work_start_at || "-",
                        "작업 상태":
                            data.status === "1"
                                ? "미배정"
                                : data.status === "2"
                                  ? "배정완료"
                                  : data.status === "3"
                                    ? "작업중"
                                    : data.status === "4"
                                      ? "작업완료"
                                      : data.status,
                        "접수처/수리처":
                            data.cus_name + " / " + data.cus_name_rpr,
                        제품명: data.item_name,
                        주소:
                            (
                                data.addr1 ||
                                "" + " " + data.addr2 ||
                                ""
                            ).trim() || "-",
                        연락처: Common.formatPhoneNumber(data.phone),
                        "A/S 업체": data.as_cmpn_name,
                        "A/S 기사": data.repair_name,
                    }));

                    const sheet = XLSX.utils.json_to_sheet(excelData);
                    const wb = XLSX.utils.book_new();
                    const str = "처리관리";
                    XLSX.utils.book_append_sheet(wb, sheet, str);

                    const wbout = XLSX.write(wb, {
                        bookType: "xlsx",
                        type: "binary",
                    });
                    const fileName = `${str}_${Common.getCurrentFormattedTime()}.xlsx`;

                    saveAs(
                        new Blob([s2ab(wbout)], {
                            type: "application/octet-stream",
                        }),
                        fileName,
                    );
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function s2ab(s) {
            var buf = new ArrayBuffer(s.length); //convert s to arrayBuffer
            var view = new Uint8Array(buf); //create uint8array as viewer
            for (var i = 0; i < s.length; i++) view[i] = s.charCodeAt(i) & 0xff; //convert to octet
            return buf;
        }
    </script>

    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div class="contents">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>처리관리</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">HOME > A/S 관리 > 처리관리</p>
                    </div>
                </div>
                <div class="search">
                    <img src="../img/ico_search.png" class="ico-search" />

                    <select class="search-select" id="type">
                        <option value="">전체</option>
                        <option value="Y">완료</option>
                        <option value="N">미완료</option>
                    </select>

                    <select class="search-select" id="cate">
                        <option value="">전체</option>
                        <option value="item_name">제품명</option>
                        <option value="cus_name">고객/업체</option>
                        <option value="addr">주소</option>
                    </select>

                    <div class="search-in">
                        <input
                            type="text"
                            placeholder="검색어를 입력해주세요."
                            class="search-input"
                            id="search"
                            onkeypress="enterkey()"
                        />
                        <p class="btn btn-search" onclick="search()">검색</p>
                    </div>
                    <div class="btn-wrap">
                        <div
                            class="btn btn-excel btn-excel-down"
                            onclick="excel_download()"
                        >
                            <p>엑셀 다운로드</p>
                        </div>
                    </div>
                </div>
                <div class="contents-in">
                    <div class="list as-list assignment-list">
                        <table>
                            <colgroup>
                                <col style="width: 100px" />
                                <col style="width: 150px" />
                                <col style="width: 150px" />
                                <col style="width: 100px" />
                                <col style="width: 20%" />
                                <col style="width: 20%" />
                                <col style="width: 25%" />
                                <col style="width: 15%" />
                                <col style="width: 15%" />
                                <col style="width: 15%" />
                            </colgroup>
                            <tbody>
                                <tr class="t-header">
                                    <th>No.</th>
                                    <th>
                                        접수시간
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_a_created_at"
                                            onclick="sortClick('a.created_at')"
                                        />
                                    </th>
                                    <th>
                                        작업 시작일
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_a_work_start_at"
                                            onclick="
                                                sortClick('a.work_start_at')
                                            "
                                        />
                                    </th>
                                    <th>작업 상태</th>
                                    <th>
                                        접수처/수리처
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_c_name"
                                            onclick="sortClick('c.name')"
                                        />
                                    </th>
                                    <th>제품명</th>
                                    <th>고객 주소</th>
                                    <th>고객 연락처</th>
                                    <th>
                                        A/S 업체
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_as_cmpn_name"
                                            onclick="sortClick('as_cmpn_name')"
                                        />
                                    </th>
                                    <th>
                                        A/S 기사
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_repair_name"
                                            onclick="sortClick('repair_name')"
                                        />
                                    </th>
                                </tr>
                            </tbody>

                            <tbody id="list"></tbody>
                        </table>
                    </div>
                    <div class="paging">
                        <div class="paging-inner" id="pagingArea"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
