<!doctype html>
<html lang="ko">
    <head>
        <script src="../js/head-common.js?ver=1"></script>
</head>

    <script>
        const id = params.get("id");
        const currentUrl = "as";
        const currentApi = "/as";

        $(function () {
            getDetail();
        });

        function addOneHourRange(timeStr) {
            // "13:30" → 시, 분 분리
            let [hours, minutes] = timeStr.split(":").map(Number);

            // Date 객체 활용
            let start = new Date();
            start.setHours(hours, minutes, 0, 0);

            // 끝나는 시간: 1시간 추가
            let end = new Date(start.getTime() + 60 * 60 * 1000);

            // 시:분 포맷 (2자리)
            const pad = (n) => n.toString().padStart(2, "0");

            let startStr = `${pad(start.getHours())}:${pad(
                start.getMinutes(),
            )}`;
            let endStr = `${pad(end.getHours())}:${pad(end.getMinutes())}`;

            return `${formatTime(startStr)}~${formatTime(endStr)}`;
        }

        function formatTime(timeStr) {
            // "HH:mm" 형식 들어온다고 가정
            let [hour, minute] = timeStr.split(":");
            hour = String(Number(hour)); // 숫자로 바꿨다가 다시 문자로 → 앞의 0 제거됨
            return `${hour}:${minute}`;
        }

        function getDetail() {
            Common.sendAxios(`${currentApi}/${id}`)
                .then(async (json) => {
                    const data = json.data;

                    const cus_name = data.cus_name;
                    const item_name = data.item_name;
                    const addr1 = data.addr1;
                    const addr2 = data.addr2;
                    const addr3 = data.addr3;
                    const phone = Common.formatPhoneNumber(data.phone);
                    const symptom_cus = (data.symptom_cus || "").replaceAll(
                        "<br>",
                        "\r\n",
                    );
                    const as_request = data.as_request;

                    if (as_request == "N") {
                        $("input[name='as_request'][value='N']").prop(
                            "checked",
                            true,
                        );
                    } else {
                        $("input[name='as_request'][value='Y']").prop(
                            "checked",
                            true,
                        );
                    }

                    const cus_name_rpr = data.cus_name_rpr;
                    $("#cus_name").val(cus_name + " / " + cus_name_rpr);
                    $("#item_name").val(item_name);
                    $("#addr1").val(addr1);
                    $("#addr2").val(addr2);
                    $("#zipcode").val(addr3);
                    $("#phone").val(phone);
                    $("#symptom_cus").val(symptom_cus);
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function deletion() {
            if (
                confirm(
                    "정말 삭제하시겠습니까?\n한번 삭제한 데이터는 복구 할 수 없습니다.",
                ) == true
            ) {
                const formData = new FormData();
                formData.append("id_list", id);
                formData.append("status", "6");

                Common.sendAxios(`/as/delete`, formData)
                    .then(async (json) => {
                        alert(json.msg);
                        location.href = `${currentUrl}_list.html`;
                    })
                    .catch((err) => {
                        console.error("ERROR : ", err);
                    });
            }
        }

        function modify() {
            const queryString = window.location.search;
            location.href = `${currentUrl}_form.html${queryString}`;
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            params.delete("id");

            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_list.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_list.html`;
            }
        }
    </script>

    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div class="contents contents-add detail-view">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>접수관리</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">HOME > A/S 관리 > 접수관리</p>
                    </div>
                </div>

                <div class="contents-in scroll-custom">
                    <div class="info-in info-in-modify-info">
                        <p class="as-p">접수 타입</p>

                        <input
                            type="radio"
                            name="as_request"
                            class="input-radio"
                            value="N"
                            disabled
                        />
                        <p
                            class="info-title"
                            style="
                                background-color: #fff;
                                justify-content: left;
                                width: 80px;
                                background: none;
                                justify-content: left;
                                padding-left: 10px;
                            "
                        >
                            신규
                        </p>

                        <input
                            type="radio"
                            name="as_request"
                            class="input-radio"
                            value="Y"
                            disabled
                        />
                        <p
                            class="info-title"
                            style="
                                background-color: #fff;
                                justify-content: left;
                                width: 80px;
                                background: none;
                                justify-content: left;
                                padding-left: 10px;
                            "
                        >
                            재콜
                        </p>
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p class="as-p">접수처/수리처</p>
                        <input type="text" readonly id="cus_name" />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p class="as-p">제품명</p>
                        <input type="text" id="item_name" readonly />
                    </div>

                    <div class="info-in info-addr info-in-modify-info">
                        <p class="as-p">A/S 방문 주소</p>
                        <div class="addr-wrap">
                            <div class="addr-zipcode-wrap">
                                <input
                                    type="text"
                                    readonly
                                    id="zipcode"
                                    readonly
                                />
                            </div>
                            <input
                                type="text"
                                id="addr1"
                                class="addr-dtl"
                                style="cursor: text"
                                readonly
                            />
                            <input
                                type="text"
                                id="addr2"
                                class="addr-dtl"
                                readonly
                            />
                        </div>
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p class="as-p">연락처</p>
                        <input type="text" id="phone" maxlength="11" readonly />
                    </div>

                    <div
                        class="info-in info-in-t info-in-modify-info"
                        style="height: 76px"
                    >
                        <p class="as-p">고객 증상</p>
                        <textarea
                            class="scroll-custom"
                            style="height: 64px"
                            id="symptom_cus"
                            readonly
                        ></textarea>
                    </div>
                </div>

                <div class="btn-wrap" style="margin-top: 21px; right: 33px">
                    <div class="btn btn-del" onclick="deletion()">
                        <p>삭제</p>
                    </div>

                    <div class="btn btn-del" onclick="backPage()">
                        <p>뒤로</p>
                    </div>

                    <div class="btn btn-add" onclick="modify()">
                        <p>수정</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
