<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>A/S 이력관리시스템</title>
        <link rel="shortcut icon" href="../img/ico_shortIcon.png" />
        <script
            src="https://code.jquery.com/jquery-3.6.1.min.js"
            integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ="
            crossorigin="anonymous"
        ></script>
        <script src="../js/axios.min.js"></script>
        <script type="text/javascript" src="../js/common.js?ver=1"></script>
        <link rel="stylesheet" href="../css/common.css" />
        <link rel="stylesheet" href="../css/style.css" />

        <!-- Sheet JS -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.14.3/xlsx.full.min.js"></script>
        <!--FileSaver savaAs 이용 -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.min.js"></script>
    </head>

    <script>
        let arr = [];
        const currentUrl = "sales";
        const currentApi = "/sales";
        const sort =
            params.get("sort") == undefined
                ? decodeURI("a.created_at DESC")
                : decodeURI(params.get("sort"));
        const page = params.get("page") || "1";
        const cate = decodeURI(params.get("cate")) || "";
        const startDate = params.get("startDate") || "";
        const endDate = params.get("endDate") || "";
        const type = decodeURI(params.get("type")) || "";

        $(function () {
            getRepairList();
            getList();

            if (params.get("page") == null) {
                location.href = `${currentUrl}_list.html?page=1&sort=${sort}&cate=&startDate=&endDate=&type=`;
            } else {
                let [sortColumn, sortDir] = sort.split(" ");
                sortColumn = sortColumn.replace(".", "_");

                const arrowIcon =
                    sortDir === "DESC"
                        ? "ico_arrow_down.png"
                        : "ico_arrow_up.png";

                $(`#sort_${sortColumn}`).attr("src", `../img/${arrowIcon}`);

                $("#startDate").val(startDate);
                $("#endDate").val(endDate);
            }
        });

        // sort
        function sortClick(select) {
            // 현재 sort 상태가 예: "name DESC" 또는 "name"
            const [currentColumn, currentDirection] = sort.split(" ");

            // 같은 컬럼 클릭 시 정렬 방향 토글, 다른 컬럼 클릭 시 DESC로 시작
            const newDirection =
                currentColumn === select
                    ? currentDirection === "DESC"
                        ? ""
                        : "DESC"
                    : "DESC";

            // 정렬 문자열 구성 (기본 오름차순이면 컬럼명만 넘김)
            const newSort = newDirection ? `${select} ${newDirection}` : select;

            location.href = `${currentUrl}_list.html?page=${page}&&sort=${newSort}&cate=${cate}&type=${type}`;
        }

        // 리스트
        function getList() {
            $("#list").empty();
            $("#cate").val(cate);
            $("#type").val(type);

            if (cate == "") {
                $("#repair_name").val("전체");
            }

            Common.sendAxios(
                `${currentApi}?&page=${page}&sort=${sort}&cate=${$(
                    "#cate",
                ).val()}&startDate=${startDate}&endDate=${endDate}&type=${$("#type").val()}`,
            )
                .then(async (json) => {
                    if (json.code == 200) {
                        const list = json.data;
                        const searchVO = json.searchVO;

                        if (list.length == 0) {
                            $("#list").append(
                                $(
                                    `<tr><td colspan='${$("#list").closest("table").find("colgroup col").length}'>검색 결과가 없습니다.</td></tr>`,
                                ),
                            );
                            return false;
                        }

                        Common.renderPaging(searchVO);

                        const dataRowCount = 9 - list.length;
                        let sum_total_price = 0;
                        let sum_expense_price = 0;
                        let sum_loss_price = 0;

                        for (let i = 0; i < list.length; i++) {
                            const data = list[i];
                            const id = data.as_id;
                            const transfer = data.transfer;

                            let tr = $(
                                `<tr id="tr${id}" class="list_check" val="${id}" onclick="detail(event, ${id}, ${data.status})">`,
                            );

                            if (transfer === "Y") tr.addClass("as-orange-row");

                            const listno =
                                searchVO.totalCnt -
                                ((searchVO.page - 1) * searchVO.recordSize + i);
                            const created_at = data.created_at.slice(0, 16);
                            const work_start_at = data.work_start_at || "-";
                            const work_end_at = data.work_end_at || "-";
                            const cus_name = data.cus_name;
                            const cus_name_rpr = data.cus_name_rpr;
                            const item_name = data.item_name?.trim() || "-";
                            const repair_id = data.repair_id;
                            const repair_name = data.repair_name || "미배정";
                            const as_cmpn_name = data.as_cmpn_name || "-";
                            const status = data.status;
                            const total_price = Common.numberWithCommas(
                                data.total_price,
                            );
                            const expense_price = Common.numberWithCommas(
                                data.expense_price,
                            );
                            const loss_price = Common.numberWithCommas(
                                data.loss_price,
                            );
                            const net_profit = Common.numberWithCommas(
                                data.total_price - data.expense_price,
                            );

                            sum_total_price += data.total_price;
                            sum_expense_price += data.expense_price;
                            sum_loss_price += data.loss_price;

                            tr.append($($(`<td>${listno}</td>`)));
                            if (status == "1") {
                                tr.append($(`<td>${created_at}</td>`));
                                tr.append($(`<td>-</td>`));
                                tr.append($(`<td>${work_end_at}</td>`));
                                tr.append(
                                    $(
                                        `<td class="as-status" style="color: #8EE1C6">미배정</td>`,
                                    ),
                                );
                            } else if (status == "2") {
                                tr.append($(`<td>${created_at}</td>`));
                                tr.append($(`<td>-</td>`));
                                tr.append($(`<td>${work_end_at}</td>`));
                                tr.append(
                                    $(
                                        `<td class="as-status" style="color: #7C58FF">배정완료</td>`,
                                    ),
                                );
                            } else if (status == "3") {
                                tr.append($(`<td>${created_at}</td>`));
                                tr.append($(`<td>${work_start_at.slice(0, 16)}</td>`));
                                tr.append($(`<td>${work_end_at.slice(0, 16)}</td>`));
                                tr.append(
                                    $(
                                        `<td class="as-status" style="color: #FFA95D">작업중</td>`,
                                    ),
                                );
                            } else if (status == "4") {
                                tr.append($(`<td>${created_at}</td>`));
                                tr.append($(`<td>${work_start_at.slice(0, 16)}</td>`));
                                tr.append($(`<td>${work_end_at.slice(0, 16)}</td>`));
                                tr.append(
                                    $(
                                        `<td class="as-status" style="color: #4E8EED">작업완료</td>`,
                                    ),
                                );
                            }

                            tr.append(
                                $(`<td>${cus_name}<br>${cus_name_rpr}</td>`),
                            );
                            tr.append($(`<td>${item_name}</td>`));

                            const cls = transfer === "Y" ? "as-orange" : "";
                            tr.append(
                                `<td class="${cls}">${as_cmpn_name}</td>`,
                            );
                            tr.append(`<td class="${cls}">${repair_name}</td>`);

                            tr.append($(`<td>${total_price}원</td>`));
                            tr.append($(`<td>${expense_price}원</td>`));
                            tr.append(
                                $(`<td class="total">${net_profit}원</td>`),
                            );
                            tr.append($(`<td>${loss_price}원</td>`));

                            $("#list").append(tr);
                        }

                        // 부족한 줄만큼 빈 행 추가
                        for (let i = 0; i < dataRowCount; i++) {
                            $("#list").append(
                                "<tr><td colspan='11'>&nbsp;</td></tr>",
                            );
                        }

                        $("#list_footer").append(
                            `
                                        <tr class="total-page">
                                            <td colspan="9">페이지합계</td>
                                            <td>${Common.numberWithCommas(
                                                sum_total_price,
                                            )}</td>
                                            <td>${Common.numberWithCommas(
                                                sum_expense_price,
                                            )}</td>
                                            <td>${Common.numberWithCommas(
                                                sum_total_price -
                                                    sum_expense_price,
                                            )}</td>
                                            <td>${Common.numberWithCommas(
                                                sum_loss_price,
                                            )}</td>
                                            <td></td>
                                        </tr>
                                        <tr class="total-sum">
                                            <td colspan="9">총합계</td>
                                            <td>${Common.numberWithCommas(
                                                searchVO.total_price_sum,
                                            )}</td>
                                            <td>${Common.numberWithCommas(
                                                searchVO.expense_price_sum,
                                            )}</td>
                                            <td>${Common.numberWithCommas(
                                                searchVO.total_price_sum -
                                                    searchVO.expense_price_sum,
                                            )}</td>
                                            <td>${Common.numberWithCommas(
                                                searchVO.loss_price_sum,
                                            )}</td>
                                            <td></td>
                                        </tr>
                                        `,
                        );
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        // paging 이동
        function pageMove(pageIndex) {
            location.href = `${currentUrl}_list.html?page=${pageIndex}&sort=${sort}&cate=${cate}&startDate=${$(
                "#startDate",
            ).val()}&endDate=${$("#endDate").val()}&type=${type}`;
        }

        // 검색
        function search() {
            const startDateStr = $("#startDate").val();
            const endDateStr = $("#endDate").val();

            if (startDateStr && endDateStr) {
                // 문자열 → Date 객체
                const start = new Date(startDateStr);
                const end = new Date(endDateStr);

                // start가 end보다 늦으면 경고
                if (start > end) {
                    alert(
                        "시작일이 종료일보다 늦습니다. 날짜를 다시 선택해주세요.",
                    );
                    return;
                }
            }

            location.href = `${currentUrl}_list.html?page=1&sort=${sort}&cate=${$(
                "#cate",
            ).val()}&startDate=${startDateStr}&endDate=${endDateStr}&type=${$("#type").val()}`;
        }

        // 상세
        function detail(e, id, status) {
            var targetId = $(e.target).attr("id") || "";

            if (targetId.includes("row")) {
                return;
            }

            const queryString = window.location.search;

            if (status == "1") {
                location.href = `assignment_form.html?id=${id}${queryString.replace(
                    "?",
                    "&",
                )}`;
            } else if (status == "2") {
                location.href = `process_form.html?id=${id}${queryString.replace(
                    "?",
                    "&",
                )}`;
            } else if (status == "3") {
                location.href = `process_end_form.html?id=${id}${queryString.replace(
                    "?",
                    "&",
                )}`;
            } else if (status == "4") {
                location.href = `sales_detail.html?id=${id}${queryString.replace(
                    "?",
                    "&",
                )}`;
            }
        }

        // 엑셀 다운로드
        function excel_download() {
            Common.sendAxios(
                `${currentApi}?page=${page}&sort=${sort}&cate=${cate}&startDate=${$(
                    "#startDate",
                ).val()}&endDate=${$("#endDate").val()}&type=${type}&usePageNavy=false`,
            )
                .then(async (json) => {
                    const list = json.data;

                    if (list.length == 0) {
                        alert("조회된 결과가 없습니다.");
                        return;
                    }

                    const excelData = list.map((data) => ({
                        접수시간: data.created_at,
                        "작업 시작일": data.work_start_at || "-",
                        "작업 완료일": data.work_end_at || "-",
                        "작업 상태":
                            data.status === "1"
                                ? "미배정"
                                : data.status === "2"
                                  ? "배정완료"
                                  : data.status === "3"
                                    ? "작업중"
                                    : data.status === "4"
                                      ? "작업완료"
                                      : data.status,
                        "접수처/수리처":
                            data.cus_name + " / " + data.cus_name_rpr,
                        제품명: data.item_name,
                        주소:
                            (
                                data.addr1 ||
                                "" + " " + data.addr2 ||
                                ""
                            ).trim() || "-",
                        연락처: Common.formatPhoneNumber(data.phone),
                        "A/S 업체": data.as_cmpn_name,
                        "A/S 기사": data.repair_name || "미배정",
                        총금액: Common.numberWithCommas(data.total_price),
                        지출액: Common.numberWithCommas(data.expense_price),
                        차액: Common.numberWithCommas(
                            data.total_price - data.expense_price,
                        ),
                        손실금액: Common.numberWithCommas(data.loss_price),
                    }));

                    const sheet = XLSX.utils.json_to_sheet(excelData);
                    const wb = XLSX.utils.book_new();
                    const str = "매출관리";
                    XLSX.utils.book_append_sheet(wb, sheet, str);

                    const wbout = XLSX.write(wb, {
                        bookType: "xlsx",
                        type: "binary",
                    });
                    const fileName = `${str}_${Common.getCurrentFormattedTime()}.xlsx`;

                    saveAs(
                        new Blob([s2ab(wbout)], {
                            type: "application/octet-stream",
                        }),
                        fileName,
                    );
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function s2ab(s) {
            var buf = new ArrayBuffer(s.length); //convert s to arrayBuffer
            var view = new Uint8Array(buf); //create uint8array as viewer
            for (var i = 0; i < s.length; i++) view[i] = s.charCodeAt(i) & 0xff; //convert to octet
            return buf;
        }

        // 기사 팝업
        function popup_repair() {
            $(".background-item").css({ "z-index": "1000000" });
            $(".show-use-item").css({ "z-index": "100" });
            document.querySelector(".background-item").className =
                "background-item show-use-item";
        }

        function popup_repair_close() {
            $(".background-item").css({ "z-index": "-1" });
            document.querySelector(".background-item").className =
                "background-item";
        }

        // 기사 리스트
        function getRepairList() {
            Common.sendAxios(
                `/repair?&keyword=${decodeURI(
                    $("#search_repair").val(),
                )}&page=1&sort=${decodeURI("a.name")}&cate=&usePageNavy=false`,
            )
                .then(async (json) => {
                    if (json.code == 200) {
                        const list = json.data;
                        const searchVO = json.searchVO;

                        $("#listRepair").empty();

                        if (list.length == 0) {
                            $("#listRepair").append(
                                $(
                                    "<tr><td colspan='3'>검색 결과가 없습니다.</td></tr>",
                                ),
                            );
                            return false;
                        }

                        for (let i = 0; i < list.length; i++) {
                            const data = list[i];
                            const id = data.account_id;

                            let tr = $(
                                `<tr id="tr${id}" onclick="selectRapair(${id},'${data.name}')">`,
                            );

                            if (cate == id) {
                                $("#repair_name").val(data.name);
                            }

                            const listno =
                                searchVO.totalCnt -
                                ((searchVO.page - 1) * searchVO.recordSize + i);
                            const name = data.name;
                            const phone = data.phone;

                            tr.append($($(`<td>${listno}</td>`)));
                            tr.append($(`<td>${name}</td>`));
                            tr.append($(`<td>${phone}</td>`));

                            $("#listRepair").append(tr);
                        }
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function selectRapair(id, name) {
            $("#cate").val(id);
            $("#repair_name").val(name);

            popup_repair_close();
        }

        function init() {
            location.href = `${currentUrl}_list.html?page=1&sort=${sort}&cate=&startDate=&endDate=`;
        }
    </script>

    <body>
        <div class="top"></div>
        <div class="main">
            <div class="menu"></div>
            <div class="contents">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>매출관리</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">HOME > A/S 관리 > 매출관리</p>
                    </div>
                </div>
                <div class="search">
                    <img src="../img/ico_search.png" class="ico-search" />

                    <select
                        class="search-select"
                        id="type"
                        style="margin-right: 0px"
                    >
                        <option value="">전체</option>
                        <option value="Y">완료</option>
                        <option value="N">미완료</option>
                    </select>

                    <p class="p-search-title">A/S 기사</p>
                    <input
                        type="text"
                        class="search-input"
                        id="repair_name"
                        style="width: 220px; cursor: pointer"
                        readonly
                        onclick="popup_repair()"
                    />
                    <input type="hidden" id="cate" />

                    <p class="p-search-title">일시</p>
                    <div class="search-in">
                        <input
                            type="date"
                            class="search-input"
                            style="width: 200px"
                            id="startDate"
                        />
                        <p class="p-search-title">~</p>
                        <input
                            type="date"
                            class="search-input"
                            style="width: 200px"
                            id="endDate"
                        />
                        <p
                            class="btn btn-search"
                            onclick="search()"
                            style="margin-right: 0px"
                        >
                            검색
                        </p>
                        <p class="btn btn-search" onclick="init()">초기화</p>
                    </div>

                    <div class="btn-wrap">
                        <div
                            class="btn btn-excel btn-excel-down"
                            onclick="excel_download()"
                        >
                            <p>엑셀 다운로드</p>
                        </div>
                    </div>
                </div>
                <div class="contents-in">
                    <div class="list as-list list-sales">
                        <table>
                            <colgroup>
                                <col style="width: 100px" />
                                <col style="width: 150px" />
                                <col style="width: 150px" />
                                <col style="width: 150px" />
                                <col style="width: 100px" />
                                <col style="width: 25%" />
                                <col style="width: 25%" />
                                <col style="width: 25%" />
                                <col style="width: 25%" />
                                <col style="width: 110px" />
                                <col style="width: 110px" />
                                <col style="width: 110px" />
                                <col style="width: 110px" />
                            </colgroup>
                            <tbody>
                                <tr class="t-header">
                                    <th>No.</th>
                                    <th>
                                        접수시간
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_a_created_at"
                                            onclick="sortClick('a.created_at')"
                                        />
                                    </th>
                                    <th>
                                        작업 시작일
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_a_work_start_at"
                                            onclick="
                                                sortClick('a.work_start_at')
                                            "
                                        />
                                    </th>
                                    <th>
                                        작업 완료일
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_a_work_end_at"
                                            onclick="sortClick('a.work_end_at')"
                                        />
                                    </th>
                                    <th>작업 상태</th>
                                    <th>
                                        접수처/수리처
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_c_name"
                                            onclick="sortClick('c.name')"
                                        />
                                    </th>
                                    <th>제품명</th>
                                    <th>
                                        A/S 업체
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_b2_name"
                                            onclick="sortClick('b2.name')"
                                        />
                                    </th>
                                    <th>
                                        A/S 기사
                                        <img
                                            src="../img/ico_arrow_down.png"
                                            class="ico-sort"
                                            id="sort_e_name"
                                            onclick="sortClick('e.name')"
                                        />
                                    </th>
                                    <th>총금액</th>
                                    <th>지출액</th>
                                    <th>차액</th>
                                    <th>손실금액</th>
                                </tr>
                            </tbody>

                            <tbody id="list"></tbody>

                            <tfoot id="list_footer"></tfoot>
                        </table>
                    </div>
                    <div class="paging">
                        <div class="paging-inner" id="pagingArea"></div>
                    </div>
                </div>

                <!-- A/S 기사 목록 팝업 -->
                <div class="background-item">
                    <div class="window">
                        <div class="popup popup-list-dtl" style="width: 749px">
                            <div class="popup-hd"><p>A/S 기사 목록</p></div>
                            <div class="popup-search">
                                <div class="popup-search-in">
                                    <div class="popup-search-in">
                                        <input
                                            type="text"
                                            placeholder="검색어를 입력해주세요."
                                            class="search-input"
                                            id="search_repair"
                                            onkeypress="getRepairList()"
                                        />
                                    </div>
                                    <img
                                        src="../img/ico_search_popup.png"
                                        class="ico-search-popup"
                                        onclick="getRepairList()"
                                    />
                                </div>
                            </div>
                            <div class="popup-in">
                                <div class="contents-in popup-contents-in">
                                    <div
                                        class="list popup-list"
                                        style="height: calc(100vh - 458px)"
                                    >
                                        <table>
                                            <colgroup>
                                                <col style="width: 100px" />
                                                <col style="width: 50%" />
                                                <col style="width: 50%" />
                                            </colgroup>

                                            <tbody>
                                                <tr>
                                                    <th>NO</th>
                                                    <th>기사명</th>
                                                    <th>연락처</th>
                                                </tr>
                                            </tbody>

                                            <tbody id="listRepair"></tbody>
                                        </table>
                                    </div>
