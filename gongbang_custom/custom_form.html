<!doctype html>
<html lang="ko">
    <head>
        <script src="../js/head-common.js?ver=1"></script>
<!-- 카카오맵 연동 -->
        <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    </head>

    <script>
        const id = params.get("id");
        const currentUrl = "custom";
        const currentApi = "/custom";

        function kakaopost() {
            new daum.Postcode({
                oncomplete: function (data) {
                    document.querySelector("#zipcode").value = data.zonecode;
                    document.querySelector("#addr1").value = data.address + " ";
                },
            }).open();
        }

        function kakaopost_rpr() {
            new daum.Postcode({
                oncomplete: function (data) {
                    document.querySelector("#zipcode_rpr").value =
                        data.zonecode;
                    document.querySelector("#addr1_rpr").value =
                        data.address + " ";
                },
            }).open();
        }

        $(function () {
            if (id != null) {
                getDetail();
                $("#saveBtn").html("수정");
            } else {
                $(".btn-del").css("display", "none");
                $("#saveBtn").html("등록");
            }
        });

        function getDetail() {
            Common.sendAxios(`${currentApi}/${id}`)
                .then(async (json) => {
                    const data = json.data;

                    const name = data.name;
                    const phone = data.phone;
                    const addr1 = data.addr1;
                    const addr2 = data.addr2;
                    const addr3 = data.addr3;
                    const note = data.note?.replaceAll("<br>", "\r\n");

                    const name_rpr = data.name_rpr;
                    const phone_rpr = data.phone_rpr;
                    const addr1_rpr = data.addr1_rpr;
                    const addr2_rpr = data.addr2_rpr;
                    const addr3_rpr = data.addr3_rpr;
                    const note_rpr = data.note_rpr?.replaceAll("<br>", "\r\n");

                    $("#name").val(name);
                    $("#phone").val(phone);
                    $("#addr1").val(addr1);
                    $("#addr2").val(addr2);
                    $("#zipcode").val(addr3);
                    $("#note").val(note);

                    $("#name_rpr").val(name_rpr);
                    $("#phone_rpr").val(phone_rpr);
                    $("#addr1_rpr").val(addr1_rpr);
                    $("#addr2_rpr").val(addr2_rpr);
                    $("#zipcode_rpr").val(addr3_rpr);
                    $("#note_rpr").val(note_rpr);
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function saveClick() {
            const formData = new FormData();
            const name = $("#name").val();
            const phone = $("#phone").val();
            const addr1 = $("#addr1").val();
            const addr2 = $("#addr2").val();
            const addr3 = $("#zipcode").val();
            const note = ($("#note").val() || "")?.replaceAll("<br>", "\r\n");
            let method = "";

            if (Common.nullCheck(name, "name", "접수처명")) return;
            if (Common.nullCheck(phone, "phone", "접수처 연락처")) return;

            formData.append("name", name);
            formData.append("phone", phone);
            formData.append("addr1", addr1);
            formData.append("addr2", addr2);
            formData.append("addr3", addr3);
            formData.append("note", note);

            const name_rpr = $("#name_rpr").val();
            const phone_rpr = $("#phone_rpr").val();
            const addr1_rpr = $("#addr1_rpr").val();
            const addr2_rpr = $("#addr2_rpr").val();
            const addr3_rpr = $("#zipcode_rpr").val();
            const note_rpr = ($("#note_rpr").val() || "")?.replaceAll(
                "<br>",
                "\r\n",
            );

            if (Common.nullCheck(name_rpr, "name_rpr", "수리처명")) return;
            if (Common.nullCheck(phone_rpr, "phone_rpr", "수리처 연락처"))
                return;

            formData.append("name_rpr", name_rpr);
            formData.append("phone_rpr", phone_rpr);
            formData.append("addr1_rpr", addr1_rpr);
            formData.append("addr2_rpr", addr2_rpr);
            formData.append("addr3_rpr", addr3_rpr);
            formData.append("note_rpr", note_rpr);

            if (id != null) {
                method = "/put";
                formData.append("cus_id", id);
            }

            Common.sendAxios(`${currentApi}${method}`, formData)
                .then(async (json) => {
                    if (json.code == 200) {
                        alert(json.msg);

                        if (id == null) {
                            const params = new URLSearchParams(
                                window.location.search,
                            );
                            params.delete("id");

                            const queryString = params.toString();
                            location.href = `${currentUrl}_list.html${queryString}`;
                        } else {
                            const queryString = window.location.search;
                            location.href = `${currentUrl}_detail.html${queryString}`;
                        }
                    } else if (json.code == 202) {
                        alert(json.msg);
                        $(`#${json.data}`).focus();
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function deletion() {
            if (
                confirm(
                    "정말 삭제하시겠습니까?\n한번 삭제한 데이터는 복구 할 수 없습니다.",
                ) == true
            ) {
                const formData = new FormData();
                formData.append("id_list", id);

                Common.sendAxios(`${currentApi}/delete`, formData)
                    .then(async (json) => {
                        alert(json.msg);
                        location.href = `${currentUrl}_list.html`;
                    })
                    .catch((err) => {
                        console.error("ERROR : ", err);
                    });
            }
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_detail.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_detail.html`;
            }
        }
    </script>

    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div
                class="contents contents-add scroll-custom"
                style="height: calc(100vh - 140px); overflow: scroll"
            >
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>고객 정보 관리</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">HOME > 고객 관리 > 고객 정보 관리</p>
                    </div>
                </div>
                <div class="contents-in scroll-custom" style="height: 531px">
                    <div class="info-in">
                        <p>
                            <span class="r-value">*&nbsp;</span>
                            접수처명
                        </p>
                        <input type="text" id="name" />
                    </div>
                    <div class="info-in">
                        <p>
                            <span class="r-value">*&nbsp;</span>
                            접수처 연락처
                        </p>
                        <input
                            type="text"
                            class="number"
                            id="phone"
                            maxlength="11"
                        />
                    </div>
                    <div class="info-in info-addr">
                        <p>접수처 주소</p>
                        <div class="addr-wrap">
                            <div class="addr-zipcode-wrap">
                                <input
                                    type="text"
                                    readonly
                                    class="addr-zipcode"
                                    id="zipcode"
                                    onclick="kakaopost()"
                                />
                                <p onclick="kakaopost()" class="btn-addr">
                                    접수처 주소 검색
                                </p>
                            </div>
                            <input
                                type="text"
                                id="addr1"
                                class="addr-dtl"
                                onclick="kakaopost()"
                                readonly
                            />
                            <input
                                type="text"
                                id="addr2"
                                class="addr-dtl"
                                placeholder="상세주소를 입력해주세요."
                            />
                        </div>
                    </div>
                    <div class="info-in info-in-rm">
                        <p>접수처 비고</p>
                        <textarea class="scroll-custom" id="note"></textarea>
                    </div>

                    <div class="info-in">
                        <p>
                            <span class="r-value">*&nbsp;</span>
                            수리처명
                        </p>
                        <input type="text" id="name_rpr" />
                    </div>
                    <div class="info-in">
                        <p>
                            <span class="r-value">*&nbsp;</span>
                            수리처 연락처
                        </p>
                        <input
                            type="text"
                            class="number"
                            id="phone_rpr"
                            maxlength="11"
                        />
                    </div>
                    <div class="info-in info-addr">
                        <p>수리처 주소</p>
                        <div class="addr-wrap">
                            <div class="addr-zipcode-wrap">
                                <input
                                    type="text"
                                    readonly
                                    class="addr-zipcode"
                                    id="zipcode_rpr"
                                    onclick="kakaopost_rpr()"
                                />
                                <p onclick="kakaopost_rpr()" class="btn-addr">
                                    수리처 주소 검색
                                </p>
                            </div>
                            <input
                                type="text"
                                id="addr1_rpr"
                                class="addr-dtl"
                                onclick="kakaopost_rpr()"
                                readonly
                            />
                            <input
                                type="text"
                                class="addr-dtl"
                                id="addr2_rpr"
                                placeholder="상세주소를 입력해주세요."
                            />
                        </div>
                    </div>
                    <div class="info-in info-in-rm">
                        <p>수리처 비고</p>
                        <textarea
                            class="scroll-custom"
                            id="note_rpr"
                        ></textarea>
                    </div>
                </div>
                <div class="btn-wrap" style="margin-top: 21px; right: 33px">
                    <div class="btn btn-del" onclick="deletion()">
                        <p>삭제</p>
                    </div>
                    <div class="btn btn-del" onclick="backPage()">
                        <p>뒤로</p>
                    </div>
                    <div class="btn btn-add" onclick="saveClick()">
                        <p id="saveBtn"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
