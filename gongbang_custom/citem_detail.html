<!DOCTYPE html>
<html lang="ko">
    <head>
        <script src="../js/head-common.js?ver=1"></script>
</head>
    <script>
        const id = params.get("id");
        const currentUrl = "citem";
        const currentApi = "/citem";

        $(function () {
            getDetail();
        });

        function getDetail() {
            Common.sendAxios(`${currentApi}/${id}`)
                .then(async (json) => {
                    const data = json.data;

                    const ins_at = data.ins_at.substring(0, 10);
                    const cus_name = data.cus_name;
                    const rpr_name = data.rpr_name;
                    const cns_name = data.cns_name;
                    const item_name = data.item_name;
                    const standard = data.standard;
                    const repair_cmpn = data.repair_cmpn;
                    const repair_name = data.repair_name;
                    const addr = data.addr;
                    const note = (data.note || "").replaceAll("<br>", "\r\n");
                    const wty_start = data.wty_start?.substring(0, 10);
                    const wty_end = data.wty_end?.substring(0, 10);

                    $("#ins_at").val(ins_at);
                    $("#cus_name").val(cus_name);
                    $("#rpr_name").val(rpr_name);
                    $("#cns_name").val(cns_name);
                    $("#item_name").val(item_name);
                    $("#standard").val(standard);
                    $("#repair_cmpn").val(repair_cmpn);
                    $("#repair_name").val(repair_name);
                    $("#addr").val(addr);
                    $("#note").val(note);
                    $("#wty_start").val(wty_start);
                    $("#wty_end").val(wty_end);

                    const fileDto = json.searchVO;

                    for (let i = 0; i < fileDto.length; i++) {
                        const file = fileDto[i];

                        if (file.upload_column == "eqpmn") {
                            $("#preview_eqpmn").append(
                                `<li><img src="${file.upload_url}"></li>`
                            );
                        } else if (file.upload_column == "drawings") {
                            $("#preview_drawing").append(
                                `<li><img src="${file.upload_url}"></li>`
                            );
                        } else if (file.upload_column == "inst") {
                            $("#preview_inst").append(
                                `<li><img src="${file.upload_url}"></li>`
                            );
                        }
                    }
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function modify() {
            const queryString = window.location.search;
            location.href = `${currentUrl}_form.html${queryString}`;
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            params.delete("id");

            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_list.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_list.html`;
            }
        }
    </script>

    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">

            <div class="main">

            <div class="contents contents-add">

                    <div class="info-in info-in-modify-info">
                        <p>수리처명</p>
                        <input type="text" id="rpr_name" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>공사명칭</p>

                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>제품명</p>

                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>규격</p>
                        <input type="text" id="standard" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>설치업체</p>
                        <input type="text" id="repair_cmpn" readonly />
                    </div>

                    <div class="info-in info-in-modify-info">

                    <div class="info-in info-in-modify-info">

                    <div class="info-in info-in-modify-info">

                    </div>

                    <div class="info-in info-in-modify-info">
                        <p>보증 종료일</p>
                        <input type="date" id="wty_end" readonly />
                    </div>

                    <div class="info-in info-file">
                        <div class="info-file-in">
                            <p>도면 이미지</p>

                            <div>
                                <div
                                    class="info-file-inner"
                                    style="height: 122px"
                                >
                                    <div class="img-list scroll-custom">

                                            id="preview_drawing"
                                        ></ul>
                                    </div>
                                </div>

                    </div>

                    <div class="info-in info-file">
                        <div class="info-file-in">
                            <p>장비일람 이미지</p>

                            <div>
                                <div
                                    class="info-file-inner"
                                    style="height: 122px"
                                >
                                    <div class="img-list scroll-custom">
                                        <ul
                                            class="image-preview"
                                            id="preview_eqpmn"
                                        ></ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="info-in info-file">
                        <div class="info-file-in">
                            <p>설치 이미지</p>

                            <div>
                                <div
                                    class="info-file-inner"
                                    style="height: 122px"
                                >
                                    <div class="img-list scroll-custom">
                                        <ul
                                            class="image-preview"
                                            id="preview_inst"
                                        ></ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="info-in info-in-rm info-in-modify-info">
                        <p>비고</p>
                        <textarea
                            class="scroll-custom"
                            id="note"
                            readonly
                        ></textarea>
                    </div>
                </div>

                <div class="btn-wrap" style="margin-top: 21px; right: 33px">
                    <div class="btn btn-del" onclick="backPage()">
                        <p>뒤로</p>
                    </div>

                    <div class="btn btn-add" onclick="modify()">
                        <p>수정</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

        <div
            id="imgModal"
            style="
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                justify-content: center;
                align-items: center;
            "
        >
            <img id="modalImg" src="" style="max-width: 90%; max-height: 90%" />
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const lists = document.querySelectorAll(".img-list"); // 모든 img-list 선택
                if (!lists.length) return;

                const modal = document.getElementById("imgModal");
                const modalImg = document.getElementById("modalImg");

                lists.forEach((list) => {
                    list.addEventListener("click", (e) => {
                        if (e.target.tagName === "IMG") {
                            modalImg.src = e.target.src;
                            modal.style.display = "flex";
                        }
                    });
                });

                modal.addEventListener("click", () => {
                    modal.style.display = "none";
                    modalImg.src = "";
                });
            });
        </script>
    </body>
</html>
