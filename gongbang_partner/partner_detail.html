<!DOCTYPE html>
<html lang="ko">
    <head>
        <script src="../js/head-common.js?ver=1"></script>
</head>

    <script>
        const id = params.get("id");
        const currentUrl = "partner";
        const currentApi = "/partner";

        $(function () {
            getDetail();
        });

        function getDetail() {
            Common.sendAxios(`${currentApi}/${id}`)
                .then(async (json) => {
                    const data = json.data;

                    const name = data.name;
                    const owner = data.owner;
                    const tel = Common.formatPhoneNumber(data.tel);
                    const addr1 = data.addr1;
                    const addr2 = data.addr2;
                    const addr3 = data.addr3;
                    const bizno = Common.formatBusinessNumber(data.bizno);
                    const note = data.note?.replaceAll("<br>", "\r\n");

                    $("#name").val(name);
                    $("#owner").val(owner);
                    $("#tel").val(tel);
                    $("#addr1").val(addr1);
                    $("#addr2").val(addr2);
                    $("#zipcode").val(addr3);
                    $("#bizno").val(bizno);
                    $("#note").val(note);
                })
                .catch((err) => {
                    console.error("ERROR : ", err);
                });
        }

        function backPage() {
            const params = new URLSearchParams(window.location.search);
            params.delete("id");

            const queryString = params.toString();

            if (queryString) {
                location.href = `${currentUrl}_list.html?${queryString}`;
            } else {
                location.href = `${currentUrl}_list.html`;
            }
        }
    </script>

    <body>
                <button type="button" class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <div id="viewport">
            <div class="top"></div>
            <div class="main">
                <div class="menu scroll-custom"></div>
            <div class="contents contents-add">
                <div class="menu-nm">
                    <div class="menu-nm-in">
                        <img src="../img/ico_input_line.png" />
                        <p>협력업체 관리</p>
                    </div>
                    <div class="menu-nm-in menu-route">
                        <img src="../img/ico_home.png" />
                        <p class="route">
                            HOME > 협력업체 관리 > 협력업체 관리
                        </p>
                    </div>
                </div>
                <div
                    class="contents-in scroll-custom"
                    style="height: calc(100vh - 350px)"
                >
                    <div class="info-in info-in-modify-info">
                        <p>업체명</p>
                        <input type="text" id="name" readonly />
                    </div>
                    <div class="info-in info-in-modify-info">
                        <p>대표자명</p>
                        <input type="text" id="owner" readonly />
                    </div>
                    <div class="info-in info-in-modify-info">
                        <p>대표번호</p>
                        <input type="text" id="tel" readonly />
                    </div>
                    <div class="info-in info-addr info-in-modify-info">
                        <p>주소</p>
                        <div class="addr-wrap">
                            <div class="addr-zipcode-wrap">
                                <input
                                    type="text"
                                    readonly
                                    id="zipcode"
                                    readonly
                                />
                            </div>
                            <input
                                type="text"
                                id="addr1"
                                class="addr-dtl"
                                style="cursor: text"
                                readonly
                            />
                            <input
                                type="text"
                                id="addr2"
                                class="addr-dtl"
                                readonly
                            />
                        </div>
                    </div>
                    <div class="info-in info-in-modify-info">
                        <p>사업자등록번호</p>
                        <input type="text" id="bizno" readonly />
                    </div>
                    <div class="info-in info-in-rm info-in-modify-info">
                        <p>비고</p>
                        <textarea
                            class="scroll-custom"
                            id="note"
                            readonly
                        ></textarea>
                    </div>
                </div>

                <div class="btn-wrap" style="margin-top: 21px; right: 33px">
                    <div class="btn btn-del" onclick="backPage()">
                        <p>뒤로</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
